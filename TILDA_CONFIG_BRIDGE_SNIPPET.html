<div style="width:100%;margin:0;padding:0;">
  <iframe
    id="liza-frame"
    src="https://seregaobr882.github.io/liza-tilda-assets/index.html?v=10.5"
    style="display:block;width:100%;height:100vh;border:0;background:#f2f5fb;"
    loading="eager"
    referrerpolicy="no-referrer-when-downgrade"
  ></iframe>
</div>

<script>
  (function () {
    var FRAME_ID = "liza-frame";
    var MAX_TRIES = 60;
    var RETRY_MS = 500;

    // ТЕСТОВЫЙ РЕЖИМ:
    // 1) НЕ перерисовывает блоки (дизайн/верстка остаются как в GitHub)
    // 2) Включает глобальную подмену ВСЕГО текста в плейсхолдер,
    //    чтобы проверить что контент идет только из CONFIG.
    var CONFIG = {
      behavior: {
        rebuildManagedSections: false,
        fullTextControl: true
      },
      copy: {
        fullTextPlaceholder: "placeholder",
        fullTextMap: {
          // Пример для адресной замены после включения fullTextControl:
          // "t0001": "Лиза Бот",
          // "t0002": "Тарифы и калькулятор"
        },
        selectorTextMap: {
          // Опционально: точечные правки по селекторам:
          // "#hero h1": "Лиза Бот для салонов красоты",
          // "#lead-form h2": "Попробуйте Лиза Бот бесплатно 3 дня"
        }
      }
    };

    var tries = 0;
    var applied = false;
    var timer = null;

    function getFrame() {
      return document.getElementById(FRAME_ID);
    }

    function parseData(value) {
      if (typeof value !== "string") return value;
      try {
        return JSON.parse(value);
      } catch (_e) {
        return null;
      }
    }

    function getFrameOrigin() {
      var frame = getFrame();
      if (!frame || !frame.src) return "https://seregaobr882.github.io";
      try {
        return new URL(frame.src, window.location.href).origin;
      } catch (_e) {
        return "https://seregaobr882.github.io";
      }
    }

    function pushConfig() {
      if (applied) return false;
      var frame = getFrame();
      if (!frame || !frame.contentWindow) return false;
      frame.contentWindow.postMessage({ type: "LIZA_CONFIG_V1", payload: CONFIG }, getFrameOrigin());
      return true;
    }

    function startRetry() {
      if (timer) clearInterval(timer);
      timer = setInterval(function () {
        tries += 1;
        pushConfig();
        if (applied || tries >= MAX_TRIES) {
          clearInterval(timer);
          timer = null;
        }
      }, RETRY_MS);
    }

    function bindFrameLoad() {
      var frame = getFrame();
      if (!frame) return false;
      frame.addEventListener("load", pushConfig);
      return true;
    }

    window.addEventListener("message", function (event) {
      var expectedOrigin = getFrameOrigin();
      if (event.origin !== expectedOrigin) return;

      var data = parseData(event.data);
      if (!data || typeof data !== "object") return;

      if (data.type === "LIZA_CONFIG_IFRAME_READY") pushConfig();
      if (data.type === "LIZA_CONFIG_APPLIED") {
        applied = true;
        if (timer) {
          clearInterval(timer);
          timer = null;
        }
      }
    });

    if (!bindFrameLoad()) {
      var waitFrame = setInterval(function () {
        if (bindFrameLoad()) {
          clearInterval(waitFrame);
          pushConfig();
          startRetry();
        }
      }, 250);
      setTimeout(function () { clearInterval(waitFrame); }, 15000);
    }

    pushConfig();
    startRetry();
  })();
</script>
