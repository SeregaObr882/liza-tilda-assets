<!--
Вставь этот блок в Zero Block / HTML-блок в Tilda на той же странице, где iframe.
Меняй значения в CONFIG: тексты, цены, лимиты, названия тарифов.
-->
<script>
  (function () {
    var IFRAME_ORIGIN = "https://seregaobr882.github.io";
    var IFRAME_SELECTOR = 'iframe[src*="liza-tilda-assets/index.html"]';

    var CONFIG = {
      copy: {
        resultHeading: "Что приносит салону деньги уже в первый месяц",
        resultLead: "Лиза Бот закрывает реальные точки потерь в записи: неявки, отмены, тишину после визита и негатив без реакции администратора.",
        resultCards: [
          {
            title: "Снижение неявок",
            body: "Клиент получает напоминание и подтверждает визит заранее. Администратор видит риски до начала смены.",
            metric: "Фокус: доходимость визитов"
          },
          {
            title: "Возврат потерянных клиентов",
            body: "После отмены или статуса «не пришел» клиент автоматически возвращается в диалог с удобным предложением времени.",
            metric: "Фокус: повторные записи"
          },
          {
            title: "Рост отзывов и рейтинга",
            body: "Позитивные клиенты направляются в отзывы, а негатив сразу попадает админу для быстрой отработки.",
            metric: "Фокус: рейтинг и NPS"
          },
          {
            title: "Экономия времени команды",
            body: "Рутинные подтверждения, догоняющие сообщения и сервисные алерты уходят в автоматизацию.",
            metric: "Фокус: нагрузка администратора"
          }
        ],
        pricingHeading: "Тарифы и калькулятор",
        pricingRowTitle: "Выберите мессенджеры:",
        summaryIncludedLabel: "Включено",
        summarySelectedLabel: "Выбрано",
        summaryExtraLabel: "Доплата",
        selectorTextMap: {
          "#lead-form h2": "Попробуйте 3 дня бесплатно и без риска"
        }
      },
      pricing: {
        currency: "₽",
        perMonthSuffix: "/ мес",
        extraMessengerPrice: 750,
        plans: [
          {
            key: "start",
            name: "Минимальный",
            basePrice: 999,
            messagesLabel: "300 сообщений в месяц",
            includedMessengers: 1,
            allMessengersIncluded: false
          },
          {
            key: "standard",
            name: "Средний",
            basePrice: 1999,
            messagesLabel: "1000 сообщений в месяц",
            includedMessengers: 1,
            allMessengersIncluded: false
          },
          {
            key: "max",
            name: "Большой",
            basePrice: 3999,
            messagesLabel: "до 3000 сообщений в месяц",
            includedMessengers: 99,
            allMessengersIncluded: true
          }
        ],
        messengers: [
          { key: "telegram", label: "Telegram", checkedByDefault: true },
          { key: "whatsapp", label: "WhatsApp", checkedByDefault: false },
          { key: "vk", label: "ВКонтакте", checkedByDefault: false }
        ]
      }
    };

    function getFrame() {
      return document.querySelector(IFRAME_SELECTOR);
    }

    var applied = false;
    var timer = null;

    function pushConfig() {
      if (applied) return false;
      var frame = getFrame();
      if (!frame || !frame.contentWindow) return false;
      frame.contentWindow.postMessage(
        { type: "LIZA_CONFIG_V1", payload: CONFIG },
        IFRAME_ORIGIN
      );
      return true;
    }

    window.addEventListener("message", function (event) {
      if (event.origin !== IFRAME_ORIGIN) return;
      if (!event.data) return;
      if (event.data.type === "LIZA_CONFIG_IFRAME_READY") {
        pushConfig();
      }
      if (event.data.type === "LIZA_CONFIG_APPLIED") {
        applied = true;
        if (timer) clearInterval(timer);
      }
    });

    var tries = 0;
    timer = setInterval(function () {
      tries += 1;
      pushConfig();
      if (applied || tries >= 20) clearInterval(timer);
    }, 400);

    var frame = getFrame();
    if (frame) {
      frame.addEventListener("load", pushConfig);
    }
  })();
</script>
