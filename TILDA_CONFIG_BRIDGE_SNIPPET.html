    function asObject(value) {
      return value && typeof value === "object" && !Array.isArray(value) ? value : {};
    }

    function mergeMaps(baseMap, overridesMap) {
      var merged = {};
      var base = asObject(baseMap);
      var over = asObject(overridesMap);
      Object.keys(base).forEach(function (k) { merged[k] = base[k]; });
      Object.keys(over).forEach(function (k) { merged[k] = over[k]; });
      return merged;
    }

    function readStoredMap() {
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return {};
        var parsed = JSON.parse(raw);
        return asObject(parsed);
      } catch (_e) {
        return {};
      }
    }

    function writeStoredMap(map) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(asObject(map)));
      } catch (_e) {
        // no-op
      }
    }

    function escJs(value) {
      return String(value || "")
        .replace(/\\/g, "\\\\")
        .replace(/"/g, '\\"')
        .replace(/\n/g, "\\n");
    }

    function buildConfigTemplate(map, meta) {
      var m = asObject(map);
      var info = asObject(meta);
      var grouped = {};

      Object.keys(m).sort().forEach(function (key) {
        var item = info[key] && typeof info[key] === "object" ? info[key] : {};
        var section = (item.section || "common").toString();
        if (!grouped[section]) grouped[section] = [];
        grouped[section].push({
          key: key,
          value: m[key],
          kind: item.kind || "text",
          selector: item.selector || ""
        });
      });

      var lines = [];
      lines.push("// Полный текстовый конфиг (автогенерация)");
      lines.push("// Пример комментариев по секциям: hero, как_это_работает, формы, и т.д.");
      lines.push("var FULL_TEXT_MAP = {");

      Object.keys(grouped).sort().forEach(function (section) {
        lines.push("");
        lines.push("  // === Секция: " + section + " ===");
        grouped[section].forEach(function (row) {
          if (row.selector) lines.push("  // " + row.kind + " | " + row.selector);
          lines.push('  "' + escJs(row.key) + '": "' + escJs(row.value) + '",');
        });
      });

      lines.push("};");
      return lines.join("\n");
    }

    if (AUTO_BOOTSTRAP_FULL_MAP && Object.keys(baseMap).length === 0) {
      CONFIG.behavior.fullTextMode = "collect";
      CONFIG.behavior.placeholderWithKey = false;
    }

    var tries = 0;
    var applied = false;
    var timer = null;
    var liveSyncTimer = null;
    var mapBootstrapped = false;

    function getFrame() {
      return document.getElementById(FRAME_ID);
    }

    function parseData(value) {
      if (typeof value !== "string") return value;
      try {
        return JSON.parse(value);
      } catch (_e) {
        return null;
      }
    }

    function getFrameOrigin() {
      var frame = getFrame();
      if (!frame || !frame.src) return "https://seregaobr882.github.io";
      try {
        return new URL(frame.src, window.location.href).origin;
      } catch (_e) {
        return "https://seregaobr882.github.io";
      }
    }

    function pushConfig() {
      var frame = getFrame();
      if (!frame || !frame.contentWindow) return false;
      frame.contentWindow.postMessage({ type: "LIZA_CONFIG_V1", payload: CONFIG }, getFrameOrigin());
      return true;
    }

    function startRetry() {
      if (timer) clearInterval(timer);
      tries = 0;
      timer = setInterval(function () {
        tries += 1;
        if (applied && CONFIG.behavior.fullTextMode === "replace") {
          clearInterval(timer);
          timer = null;
          return;
        }
        pushConfig();
        if (tries >= MAX_TRIES) {
          clearInterval(timer);
          timer = null;
        }
      }, RETRY_MS);
    }

    function startLiveSync() {
      if (LIVE_SYNC_MS <= 0) return;
      if (liveSyncTimer) clearInterval(liveSyncTimer);
      liveSyncTimer = setInterval(function () {
        pushConfig();
      }, LIVE_SYNC_MS);
    }

    function bindFrameLoad() {
      var frame = getFrame();
      if (!frame) return false;
      frame.addEventListener("load", function () {
        applied = false;
        pushConfig();
        startRetry();
      });
      return true;
    }

    window.addEventListener("message", function (event) {
      var expectedOrigin = getFrameOrigin();
      if (event.origin !== expectedOrigin) return;

      var data = parseData(event.data);
      if (!data || typeof data !== "object") return;

      if (data.type === "LIZA_CONFIG_IFRAME_READY") {
        pushConfig();
      }

      if (data.type === "LIZA_FULLTEXT_EXPORT_READY") {
        if (!AUTO_BOOTSTRAP_FULL_MAP || mapBootstrapped) return;
        var exported = data.payload && typeof data.payload === "object" ? data.payload : {};
        var meta = data.meta && typeof data.meta === "object" ? data.meta : {};
        writeStoredMap(exported);
        baseMap = exported;
        CONFIG.copy.fullTextMap = mergeMaps(baseMap, TEXT_OVERRIDES);
        CONFIG.behavior.fullTextMode = "replace";
        mapBootstrapped = true;
        renderConfigPanel(buildConfigTemplate(baseMap, meta));

        applied = false;
        pushConfig();
      }

      if (data.type === "LIZA_CONFIG_APPLIED") {
        applied = true;
      }
    });

    if (!bindFrameLoad()) {
      var waitFrame = setInterval(function () {
        if (bindFrameLoad()) {
          clearInterval(waitFrame);
          pushConfig();
          startRetry();
        }
      }, 250);
      setTimeout(function () { clearInterval(waitFrame); }, 15000);
    }

    pushConfig();
    startRetry();
    startLiveSync();
  })();
