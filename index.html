    .liza-benefit-icon {

    .liza-benefit-content {

    .liza-benefit-kicker {

      color: #2a64d1;
      padding: 7px 14px;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.01em;

    .liza-benefit-title {

      font-size: 1.35rem;
      font-weight: 850;

    .liza-benefit-copy {

      line-height: 1.58;

    .liza-outcomes-lead {

      background: #fff;

      justify-content: center;

      box-shadow: 0 10px 24px rgba(56, 92, 187, 0.34);
      background: linear-gradient(135deg, #2f66ff 0%, #7a33ff 100%);
      flex-shrink: 0;
    }

    .liza-outcome-icon svg {
      width: 26px;
      height: 26px;
      stroke: currentColor;
    }

    .liza-outcome-title {
      margin: 0;
      color: #10253a;
      font-size: 1.12rem;
      font-weight: 800;
      line-height: 1.28;
    }

    .liza-outcome-copy {
      margin: 0;
      color: #3b4e64;
      font-size: 0.97rem;
      line-height: 1.5;
    }

    .liza-outcome-metric {
      margin-top: 12px;
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.86rem;
      font-weight: 700;
      color: #1f5fce;
      background: #edf4ff;
      border: 1px solid #d7e7ff;
    }

    .liza-pricing-shell {
      margin-top: 20px;
      display: grid;
      grid-template-columns: minmax(0, 1.75fr) minmax(280px, 1fr);
      gap: 16px;
      align-items: stretch;
    }

    .liza-pricing-widget {
      background: #fff;
      border-radius: 26px;
      border: 1px solid #d8e5fb;
      box-shadow: 0 16px 36px rgba(35, 77, 126, 0.12);
      padding: 20px;
      color: #12263a;
      display: grid;
      gap: 12px;
    }

    .liza-pricing-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .liza-plan {
      border: 1px solid #d8e5fb;
      border-radius: 18px;
      padding: 12px;
      background: #f9fbff;
      cursor: pointer;
      transition: 0.18s ease;
      min-height: 140px;
    }

    .liza-plan input {
      display: none;
    }

    .liza-plan.active {
      background: linear-gradient(135deg, #eef5ff 0%, #ebeefe 100%);
      border-color: #4a87ff;
      box-shadow: 0 10px 22px rgba(42, 102, 201, 0.2);
    }

    .liza-plan-name {
      margin: 0 0 7px;
      font-weight: 800;
      font-size: 1.04rem;
      color: #102a45;
    }

    .liza-plan-price {
      margin: 0;
      font-size: 1.38rem;
      font-weight: 900;
      color: #1d5ed0;
      letter-spacing: -0.01em;
    }

    .liza-plan-meta {
      margin-top: 8px;
      color: #516882;
      font-size: 0.86rem;
      line-height: 1.36;
    }

    .liza-plan-desc {
      margin: 4px 0 0;
      color: #5d6f84;
      font-size: 0.84rem;
      line-height: 1.35;
    }

    .liza-pricing-row-title {
      margin: 2px 0 2px;
      font-size: 0.94rem;
      font-weight: 800;
      color: #233f5b;
    }

    .liza-pricing-row-hint {
      margin: -2px 0 2px;
      color: #5b6f87;
      font-size: 0.84rem;
      line-height: 1.42;
    }

    .liza-messenger-row {

      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

      align-items: center;
      gap: 8px;
      border: 1px solid #d2e0f8;
      border-radius: 14px;
      padding: 9px 11px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #26445f;
      background: #f8fbff;
      user-select: none;
      cursor: pointer;
      transition: .18s ease;
    }

    .liza-ms-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .liza-ms-icon {
      width: 24px;
      height: 24px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 0.67rem;
      font-weight: 800;
      letter-spacing: 0.01em;
      box-shadow: 0 6px 14px rgba(46, 74, 130, 0.22);
      flex-shrink: 0;
    }

    .liza-ms-icon--telegram { background: linear-gradient(135deg, #2aabee 0%, #1b7fd6 100%); }
    .liza-ms-icon--whatsapp { background: linear-gradient(135deg, #2ec866 0%, #1d9a4c 100%); }
    .liza-ms-icon--vk { background: linear-gradient(135deg, #3a6fe8 0%, #2855c3 100%); }
    .liza-ms-icon--max { background: linear-gradient(135deg, #5f7cff 0%, #7c3bff 100%); }
    .liza-ms-icon--default { background: linear-gradient(135deg, #4f7fff 0%, #5a62d4 100%); }

    .liza-ms-item.active {
      border-color: #5692ff;
      background: #eaf2ff;
      box-shadow: inset 0 0 0 1px rgba(73, 131, 255, 0.18);
    }

    .liza-ms-item input {
      accent-color: #2b76ff;
      width: 15px;
      height: 15px;
    }

    .liza-pricing-note-grid {

      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .liza-pricing-note {

      border-radius: 14px;
      padding: 10px 12px;
      background: #f8fbff;
      color: #3d5670;
      font-size: 0.86rem;
      line-height: 1.35;
    }

    .liza-pricing-note strong {
      color: #1c3653;
      display: block;
      margin-bottom: 4px;
    }

    .liza-pricing-aside {
      border-radius: 26px;
      border: 1px solid rgba(102, 128, 255, 0.28);
      background: linear-gradient(155deg, #2f66ff 0%, #4d4bf5 52%, #6f2dff 100%);
      box-shadow: 0 24px 44px rgba(60, 65, 166, 0.32);
      color: #fff;
      padding: 20px;
      display: grid;
      align-content: start;
      gap: 12px;
    }

    .liza-aside-kicker {
      margin: 0;
      font-size: 0.84rem;
      font-weight: 600;
      color: rgba(236, 243, 255, 0.9);
    }

    .liza-aside-title {
      margin: 0;
      font-size: 2rem;
      line-height: 1;
      font-weight: 900;
      letter-spacing: -0.02em;
      color: #fff;
    }

      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.14);
      padding: 14px;
      display: grid;
      gap: 4px;
    }

      font-size: 2.05rem;
      font-weight: 900;
      color: #fff;
      line-height: 1.06;
      letter-spacing: -0.015em;
    }

    .liza-summary-line {
      font-size: 0.92rem;
      color: rgba(239, 245, 255, 0.96);
      line-height: 1.45;
    }

      align-items: center;
      justify-content: center;
      width: 100%;

      text-decoration: none;

      font-weight: 800;
      color: #1744c2;

      border-top: 1px solid #dbe6f6;

      align-items: start;

      gap: 18px;
      align-content: start;

      text-align: center;

      text-align: right;

      align-items: center;
      justify-content: center;

      height: 48px;
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;

      color: #4f43e3;
      border: 1px solid #d9e4fb;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 800;
      letter-spacing: 0.02em;

      border-color: #c8d9fb;
      color: #2b63da;
      background: #f8fbff;
    }

    .liza-footer-social svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
      stroke: none;
    }

      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid #d8e4f7;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 10px 22px rgba(34, 72, 120, 0.08);
      color: #36506b;
      font-size: 0.98rem;
      font-weight: 700;
      line-height: 1.25;
      text-align: center;
    }

    @keyframes lizaHeroFloat {
      0% { transform: translate3d(0, 0, 0) rotate(0deg) scale(1); }
      25% { transform: translate3d(-3px, -8px, 0) rotate(-1.4deg) scale(1.01); }
      50% { transform: translate3d(4px, -18px, 0) rotate(1.6deg) scale(1.02); }
      75% { transform: translate3d(-2px, -9px, 0) rotate(-0.8deg) scale(1.01); }
      100% { transform: translate3d(0, 0, 0) rotate(0deg) scale(1); }
    }

    .liza-hero-float {
      animation: lizaHeroFloat 7.4s cubic-bezier(0.45, 0.05, 0.2, 0.96) infinite;
      will-change: transform;
      transform-origin: 50% 50%;
    }

    .liza-hero-float--0 { animation-duration: 8.2s; animation-delay: 0.15s; }
    .liza-hero-float--1 { animation-duration: 7.6s; animation-delay: 0.75s; }
    .liza-hero-float--2 { animation-duration: 8.8s; animation-delay: 1.35s; }
    .liza-hero-float--3 { animation-duration: 7.1s; animation-delay: 2.15s; }

    .liza-support-link-card {
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
    }

    .liza-support-link-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 28px rgba(39, 76, 129, 0.12);
      border-color: #cdddf9;
    }

    .liza-support-overlay {
      position: absolute;
      inset: 0;
      z-index: 4;
      border-radius: inherit;
    }

    @media (max-width: 1160px) {
      .liza-pricing-shell {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 1024px) {
      .liza-benefits-grid,
      .liza-outcomes-grid,
      .liza-pricing-grid,
      .liza-pricing-note-grid,
      .liza-messenger-row {
        grid-template-columns: 1fr;
      }

      .liza-footer-grid {
        grid-template-columns: 1fr;
      }

      .liza-footer-col,
      .liza-footer-col--center,
      .liza-footer-col--right {
        justify-items: start;
        text-align: left;
      }

      .liza-footer-socials {
        justify-content: flex-start;
      }
    }

    @media (max-width: 760px) {
      .liza-benefit-card {
        grid-template-columns: 1fr;
        gap: 14px;
        padding: 20px;
        min-height: 0;
      }

      .liza-benefit-icon {
        width: 76px;
        height: 76px;
        border-radius: 24px;
        grid-row: auto;
      }

      .liza-benefit-icon svg {
        width: 36px;
        height: 36px;
      }
    }
  </style>
</head>

          });

          var key = selectedPlanKey();
          var plan = cfg.pricing.plans.find(function (x) { return x.key === key; }) || cfg.pricing.plans[0];
          var allBoxes = Array.prototype.slice.call(widget.querySelectorAll('.liza-messenger-row input[type="checkbox"]'));

          widget.querySelectorAll(".liza-plan").forEach(function (card) {
            card.classList.toggle("active", card.getAttribute("data-plan") === key);
          });

          if (plan.allMessengersIncluded) {
            allBoxes.forEach(function (box) {
              box.checked = true;
              box.disabled = true;
            });
          } else {
            allBoxes.forEach(function (box) {
              box.disabled = false;
            });
            if (selectedMsCount() === 0 && allBoxes[0]) allBoxes[0].checked = true;
          }

          var selected = selectedMsCount();
          var extraUnits = plan.allMessengersIncluded ? 0 : Math.max(0, selected - plan.includedMessengers);

          summaryExtra.textContent = cfg.copy.summaryExtraLabel + ": " + fmtMoney(extra, cfg);
          syncMessengerLabelState();
        }

        widget.addEventListener("change", syncPricing);
        syncPricing();
        return true;

          var ownerKey = ensureOwnerKey(owner);
          var nodeIdx = (ownerNodeIndex.get(ownerKey) || 0) + 1;
          ownerNodeIndex.set(ownerKey, nodeIdx);
          var textKey = ownerKey + ".n" + nodeIdx;
          if (isCollectMode) {
            var srcText = (textNode.nodeValue || "").replace(/\s+/g, " ").trim();
            exportMap[textKey] = srcText;
            exportMeta[textKey] = {
              kind: "text",
              section: inferSectionName(owner),
              selector: cssPath(owner),
              sample: srcText.slice(0, 120)
            };
          } else {
            var textValue = pickMappedValue(fullMap, textKey, placeholder, withKey);
            if (textNode.nodeValue !== textValue) {
              textNode.nodeValue = textValue;
              applied += 1;
            }
          }
          textNode = walker.nextNode();
        }

        var controls = Array.prototype.slice.call(document.body.querySelectorAll("input,textarea,button,[placeholder],[aria-label]"));
        controls.forEach(function (el) {
          if (shouldSkipNodeByParent(el)) return;
          var ownerKey = ensureOwnerKey(el);

          if (el.hasAttribute("placeholder")) {
            var phKey = ownerKey + ".placeholder";
            if (isCollectMode) {
              var phText = el.getAttribute("placeholder") || "";
              exportMap[phKey] = phText;
              exportMeta[phKey] = {
                kind: "placeholder",
                section: inferSectionName(el),
                selector: cssPath(el),
                sample: phText.slice(0, 120)
              };
            } else {
              var phValue = pickMappedValue(fullMap, phKey, placeholder, withKey);
              if (el.getAttribute("placeholder") !== phValue) {
                el.setAttribute("placeholder", phValue);
                applied += 1;
              }
            }
          }

          if (el.hasAttribute("aria-label")) {
            var ariaKey = ownerKey + ".aria";
            if (isCollectMode) {
              var ariaText = el.getAttribute("aria-label") || "";
              exportMap[ariaKey] = ariaText;
              exportMeta[ariaKey] = {
                kind: "aria",
                section: inferSectionName(el),
                selector: cssPath(el),
                sample: ariaText.slice(0, 120)
              };
            } else {
              var ariaValue = pickMappedValue(fullMap, ariaKey, placeholder, withKey);
              if (el.getAttribute("aria-label") !== ariaValue) {
                el.setAttribute("aria-label", ariaValue);
                applied += 1;
              }
            }
          }

          if (el.tagName === "INPUT") {
            var inputType = (el.getAttribute("type") || "text").toLowerCase();
            if (["hidden", "checkbox", "radio", "range", "file", "color", "date", "datetime-local", "month", "time", "week"].indexOf(inputType) === -1) {
              var valKey = ownerKey + ".value";
              if (isCollectMode) {
                var inText = el.value || "";
                exportMap[valKey] = inText;
                exportMeta[valKey] = {
                  kind: "value",
                  section: inferSectionName(el),
                  selector: cssPath(el),
                  sample: inText.slice(0, 120)
                };
              } else {
                var valValue = pickMappedValue(fullMap, valKey, placeholder, withKey);
                if (el.value !== valValue) {
                  el.value = valValue;
                  applied += 1;
                }
              }
            }
          } else if (el.tagName === "TEXTAREA") {
            var taKey = ownerKey + ".value";
            if (isCollectMode) {
              var taText = el.value || "";
              exportMap[taKey] = taText;
              exportMeta[taKey] = {
                kind: "value",
                section: inferSectionName(el),
                selector: cssPath(el),
                sample: taText.slice(0, 120)
              };
            } else {
              var taValue = pickMappedValue(fullMap, taKey, placeholder, withKey);
              if (el.value !== taValue) {
                el.value = taValue;
                applied += 1;
              }
            }
          }
        });

        if (isCollectMode) {
          upsertExportMapNode(exportMap);
          upsertExportMetaNode(exportMeta);
          try {
            window.parent.postMessage({ type: "LIZA_FULLTEXT_EXPORT_READY", payload: exportMap, meta: exportMeta }, "*");
          } catch (_e) {
            // no-op
          }
          return Object.keys(exportMap).length;
        }

        return applied;
      }

      function applyConfigToDom() {
        if (!document.body) return false;
        var changed = false;
        var navChanged = applyNavigationAndCtaCopy(runtimeConfig);
        var footerChanged = renderFooterSection(runtimeConfig);
        var heroCopyChanged = patchHeroCopy(runtimeConfig);
        var heroMetaChanged = patchHeroMetaChips(runtimeConfig);
        var leadSupportChanged = patchLeadAndSupport(runtimeConfig);
        var leadFormChanged = wireLeadFormSubmit(runtimeConfig);
        var heroMotionChanged = enhanceHeroMotion();
        if (runtimeConfig.behavior && runtimeConfig.behavior.rebuildManagedSections) {
          var benefitsOk = renderBenefitsSection(runtimeConfig);
          var resultOk = renderOutcomeSection(runtimeConfig);
          var pricingOk = renderPricingSection(runtimeConfig);
          changed = benefitsOk || resultOk || pricingOk;
        }
        var fullTextAppliedCount = applyFullTextControl(runtimeConfig);
        var exactTextAppliedCount = applyExactTextMap(runtimeConfig);
        var textAppliedCount = applySelectorOverrides(runtimeConfig);
        return changed || footerChanged || navChanged > 0 || heroCopyChanged > 0 || heroMetaChanged > 0 || leadSupportChanged > 0 || leadFormChanged > 0 || heroMotionChanged > 0 || fullTextAppliedCount > 0 || exactTextAppliedCount > 0 || textAppliedCount > 0;
      }

      function needsManagedRefresh() {
        if (!document.body) return false;
        if (runtimeConfig.behavior && runtimeConfig.behavior.rebuildManagedSections) {
          if (findHeading(document.body, ["Почему Лиза", "Преимущества", "Что реально работает в модуле", "Что реально работает"])) return true;
          if (!document.querySelector('[data-liza-managed="benefits"]')) return true;
          if (!document.querySelector('[data-liza-managed="outcomes"]')) return true;
          if (!document.querySelector('[data-liza-managed="pricing"]')) return true;
        }
        var footer = document.querySelector("footer");
        if (footer && !footer.querySelector('[data-liza-managed="footer"]')) return true;
        return false;
      }

      function startDomObserver() {
        if (domObserver || !window.MutationObserver) return;
        var target = document.getElementById("liza-tilda-root") || document.body;
        if (!target) return;
        domObserver = new MutationObserver(function () {
          if (observerTimer) clearTimeout(observerTimer);
          observerTimer = setTimeout(function () {
            observerTimer = null;
            scheduleApply();
          }, 120);
        });
        domObserver.observe(target, { childList: true, subtree: true, attributes: true, characterData: true });
      }

      function scheduleApply() {
        if (queuedApply) clearInterval(queuedApply);
        var attempts = 0;
        var maxAttempts = 40;
        queuedApply = setInterval(function () {
          attempts += 1;
          var changed = false;
          try {
            changed = applyConfigToDom();
            document.documentElement.setAttribute("data-liza-apply-state", changed ? "changed" : "checked");
            document.documentElement.removeAttribute("data-liza-apply-error");
          } catch (err) {
            document.documentElement.setAttribute("data-liza-apply-state", "error");
            document.documentElement.setAttribute("data-liza-apply-error", String(err && err.message ? err.message : err).slice(0, 220));
            clearInterval(queuedApply);
            queuedApply = null;
            return;
          }
          if (pendingConfigAck && (changed || attempts >= 2)) {
            pendingConfigAck = false;
            try {
              window.parent.postMessage({ type: "LIZA_CONFIG_APPLIED", version: 1 }, "*");
            } catch (_e) {
              // no-op
            }
          }
          if (changed && attempts > 2) {
            clearInterval(queuedApply);
            queuedApply = null;
          } else if (attempts >= maxAttempts) {
            clearInterval(queuedApply);
            queuedApply = null;
          }
        }, 250);
      }

      function applyIncomingConfig(rawPayload) {
        runtimeConfig = sanitizeConfig(rawPayload);
        enforceRuntimeFlags(runtimeConfig);
        pendingConfigAck = true;
        scheduleApply();
      }

      function tryParseJson(value) {
        if (typeof value !== "string") return value;
        try {
          return JSON.parse(value);
        } catch (_e) {
          return null;
        }
      }

      function hasHttpOrigin(origin) {
        if (!origin || origin === "null") return false;
        return /^https?:\/\//i.test(origin);
      }

      window.addEventListener("message", function (event) {
        if (event.source !== window.parent) return;
        if (!hasHttpOrigin(event.origin)) return;

        var data = tryParseJson(event.data);
        if (!data || typeof data !== "object") return;
        if (data.type !== "LIZA_CONFIG_V1") return;
        applyIncomingConfig(data.payload);
      });

      enforceRuntimeFlags(runtimeConfig);
      startDomObserver();
      scheduleApply();

      window.addEventListener("load", function () {
        enforceRuntimeFlags(runtimeConfig);
        startDomObserver();
        scheduleApply();
        try {
          window.parent.postMessage({ type: "LIZA_CONFIG_IFRAME_READY", version: 1 }, "*");
        } catch (_e) {
          // no-op
        }
      }, { once: true });
    })();
  </script>
</body>
