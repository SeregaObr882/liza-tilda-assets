<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Liza Bot Landing</title>
  <link rel="stylesheet" href="./liza-app.css?v=7" />
  <style>
    html, body { margin: 0; padding: 0; background: #f2f5fb; }
    #liza-tilda-root { width: 100%; }

    .liza-old-content {
      display: none !important;
    }

    .liza-results-rebuild {
      margin-top: 24px;
      display: grid;
      gap: 18px;
    }

    .liza-results-lead {
      background: linear-gradient(140deg, #eef5ff 0%, #f4f7ff 55%, #f7f2ff 100%);
      border: 1px solid #cfe0ff;
      border-radius: 24px;
      padding: 22px 24px;
      color: #1b3a5d;
      line-height: 1.55;
      font-size: clamp(1rem, 0.93rem + 0.26vw, 1.08rem);
      box-shadow: 0 16px 34px rgba(58, 90, 140, 0.12);
    }

    .liza-results-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .liza-results-card {
      border: 1px solid #d8e6fb;
      background: #fff;
      border-radius: 24px;
      padding: 18px;
      box-shadow: 0 12px 28px rgba(34, 79, 132, 0.1);
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }

    .liza-results-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 34px rgba(34, 79, 132, 0.14);
      border-color: #bfd5ff;
    }

    .liza-results-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .liza-results-icon {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      box-shadow: 0 10px 24px rgba(56, 92, 187, 0.34);
      background: linear-gradient(135deg, #2f66ff 0%, #7a33ff 100%);
      flex-shrink: 0;
    }

    .liza-results-title {
      margin: 0;
      color: #10253a;
      font-size: 1.12rem;
      font-weight: 800;
      line-height: 1.28;
    }

    .liza-results-copy {
      margin: 0;
      color: #3b4e64;
      font-size: 0.97rem;
      line-height: 1.5;
    }

    .liza-results-metric {
      margin-top: 12px;
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.86rem;
      font-weight: 700;
      color: #1f5fce;
      background: #edf4ff;
      border: 1px solid #d7e7ff;
    }

    .liza-launch-card {
      border-radius: 24px;
      border: 1px solid #d5e4ff;
      background: #fff;
      box-shadow: 0 12px 28px rgba(34, 79, 132, 0.1);
      padding: 20px;
    }

    .liza-launch-title {
      margin: 0 0 12px;
      font-size: 1.18rem;
      font-weight: 800;
      color: #10253a;
    }

    .liza-launch-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .liza-launch-step {
      border: 1px solid #e2ecff;
      border-radius: 16px;
      background: #f8fbff;
      padding: 12px;
      color: #304861;
      font-size: 0.93rem;
      line-height: 1.45;
    }

    .liza-launch-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 999px;
      background: linear-gradient(135deg, #2f66ff 0%, #7a33ff 100%);
      color: #fff;
      font-weight: 800;
      font-size: 0.82rem;
      margin-bottom: 8px;
    }

    .liza-pricing-shell {
      margin-top: 20px;
      display: grid;
      grid-template-columns: minmax(0, 1.75fr) minmax(280px, 1fr);
      gap: 16px;
      align-items: stretch;
    }

    .liza-pricing-widget {
      background: #fff;
      border-radius: 26px;
      border: 1px solid #d8e5fb;
      box-shadow: 0 16px 36px rgba(35, 77, 126, 0.12);
      padding: 20px;
      color: #12263a;
      display: grid;
      gap: 12px;
    }

    .liza-pricing-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .liza-plan {
      border: 1px solid #d8e5fb;
      border-radius: 18px;
      padding: 12px;
      background: #f9fbff;
      cursor: pointer;
      transition: 0.18s ease;
      min-height: 140px;
    }

    .liza-plan input {
      display: none;
    }

    .liza-plan.active {
      background: linear-gradient(135deg, #eef5ff 0%, #ebeefe 100%);
      border-color: #4a87ff;
      box-shadow: 0 10px 22px rgba(42, 102, 201, 0.2);
    }

    .liza-plan-name {
      margin: 0 0 7px;
      font-weight: 800;
      font-size: 1.04rem;
      color: #102a45;
    }

    .liza-plan-price {
      margin: 0;
      font-size: 1.38rem;
      font-weight: 900;
      color: #1d5ed0;
      letter-spacing: -0.01em;
    }

    .liza-plan-meta {
      margin-top: 8px;
      color: #516882;
      font-size: 0.86rem;
      line-height: 1.36;
    }

    .liza-pricing-row-title {
      margin: 2px 0 2px;
      font-size: 0.94rem;
      font-weight: 800;
      color: #233f5b;
    }

    .liza-messenger-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .liza-ms-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #d2e0f8;
      border-radius: 14px;
      padding: 9px 11px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #26445f;
      background: #f8fbff;
      user-select: none;
      cursor: pointer;
      transition: .18s ease;
    }

    .liza-ms-item.active {
      border-color: #5692ff;
      background: #eaf2ff;
      box-shadow: inset 0 0 0 1px rgba(73, 131, 255, 0.18);
    }

    .liza-ms-item input {
      accent-color: #2b76ff;
      width: 15px;
      height: 15px;
    }

    .liza-pricing-note-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .liza-pricing-note {
      border: 1px solid #d9e7ff;
      border-radius: 14px;
      padding: 10px 12px;
      background: #f8fbff;
      color: #3d5670;
      font-size: 0.86rem;
      line-height: 1.35;
    }

    .liza-pricing-note strong {
      color: #1c3653;
      display: block;
      margin-bottom: 4px;
    }

    .liza-pricing-aside {
      border-radius: 26px;
      border: 1px solid rgba(102, 128, 255, 0.28);
      background: linear-gradient(155deg, #2f66ff 0%, #4d4bf5 52%, #6f2dff 100%);
      box-shadow: 0 24px 44px rgba(60, 65, 166, 0.32);
      color: #fff;
      padding: 20px;
      display: grid;
      align-content: start;
      gap: 12px;
    }

    .liza-aside-kicker {
      margin: 0;
      font-size: 0.84rem;
      font-weight: 600;
      color: rgba(236, 243, 255, 0.9);
    }

    .liza-aside-title {
      margin: 0;
      font-size: 2rem;
      line-height: 1;
      font-weight: 900;
      letter-spacing: -0.02em;
      color: #fff;
    }

    .liza-pricing-summary {
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.14);
      padding: 14px;
      display: grid;
      gap: 4px;
    }

    .liza-summary-big {
      font-size: 2.05rem;
      font-weight: 900;
      color: #fff;
      line-height: 1.06;
      letter-spacing: -0.015em;
    }

    .liza-summary-line {
      font-size: 0.92rem;
      color: rgba(239, 245, 255, 0.96);
      line-height: 1.45;
    }

    .liza-pricing-cta {
      margin-top: 2px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 48px;
      border-radius: 14px;
      border: none;
      text-decoration: none;
      font-size: 0.98rem;
      font-weight: 800;
      color: #1744c2;
      background: #fff;
      transition: transform .14s ease, box-shadow .14s ease;
      box-shadow: 0 10px 22px rgba(15, 22, 62, 0.22);
    }

    .liza-pricing-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 26px rgba(15, 22, 62, 0.28);
    }

    @media (max-width: 1160px) {
      .liza-pricing-shell {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 1024px) {
      .liza-results-grid,
      .liza-pricing-grid,
      .liza-launch-grid,
      .liza-pricing-note-grid,
      .liza-messenger-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="liza-tilda-root"></div>
  <script src="./liza-app.js?v=7"></script>
  <script>
    (function () {
      var DEFAULT_CONFIG = {
        copy: {
          resultHeading: "Почему нас выбирают",
          resultLead: "Лиза берёт рутинные сообщения на себя, помогает держать запись в порядке и освобождает время команды.",
          resultCards: [
            {
              title: "Клиенты чаще доходят до визита",
              body: "Напоминания и подтверждения приходят вовремя, поэтому меньше записей срывается из-за простой забывчивости.",
              metric: "Фокус: стабильная запись"
            },
            {
              title: "Меньше ручной переписки у администратора",
              body: "Однотипные подтверждения, догоняющие сообщения и сервисные уведомления уходят в автоматизацию.",
              metric: "Фокус: время команды"
            },
            {
              title: "Отзывы собираются быстрее и аккуратнее",
              body: "После визита клиент получает запрос оценки, а негативные ответы не теряются и доходят до администратора.",
              metric: "Фокус: рейтинг и лояльность"
            },
            {
              title: "Возврат после отмен и пауз",
              body: "Если запись отменили или клиент давно не приходил, запускается сценарий возврата в диалог.",
              metric: "Фокус: повторные визиты"
            }
          ],
          pricingHeading: "Тарифы и калькулятор",
          pricingRowTitle: "Выберите тариф и мессенджеры",
          summaryIncludedLabel: "Включено",
          summarySelectedLabel: "Выбрано",
          summaryExtraLabel: "Доплата",
          fullTextPlaceholder: "placeholder",
          fullTextMap: {},
          selectorTextMap: {}
        },
        pricing: {
          currency: "₽",
          perMonthSuffix: "/ мес",
          extraMessengerPrice: 750,
          plans: [
            {
              key: "minimal",
              name: "Минимальный",
              basePrice: 999,
              messagesLabel: "до 300 сообщений в месяц",
              includedMessengers: 1,
              allMessengersIncluded: false
            },
            {
              key: "standard",
              name: "Стандарт",
              basePrice: 1999,
              messagesLabel: "до 1000 сообщений в месяц",
              includedMessengers: 1,
              allMessengersIncluded: false
            },
            {
              key: "max",
              name: "Большой",
              basePrice: 3999,
              messagesLabel: "до 3000 сообщений в месяц",
              includedMessengers: 99,
              allMessengersIncluded: true
            }
          ],
          messengers: [
            { key: "telegram", label: "Telegram", checkedByDefault: true },
            { key: "whatsapp", label: "WhatsApp", checkedByDefault: false },
            { key: "vk", label: "ВКонтакте", checkedByDefault: false },
            { key: "max", label: "MAX", checkedByDefault: false }
          ]
        },
        behavior: {
          rebuildManagedSections: false,
          fullTextControl: false,
          fullTextMode: "replace",
          placeholderWithKey: false
        }
      };

      var runtimeConfig = clone(DEFAULT_CONFIG);
      var queuedApply = null;
      var pendingConfigAck = false;
      var forceFullTextExport = false;
      try {
        forceFullTextExport = new URLSearchParams(window.location.search).get("liza_fulltext_export") === "1";
      } catch (_e) {
        forceFullTextExport = false;
      }

      function clone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function asObject(value) {
        return value && typeof value === "object" && !Array.isArray(value) ? value : null;
      }

      function safeString(value, fallback, maxLen) {
        if (typeof value !== "string") return fallback;
        var trimmed = value.trim();
        if (!trimmed) return fallback;
        if (trimmed.length > maxLen) return trimmed.slice(0, maxLen);
        return trimmed;
      }

      function safeNumber(value, fallback, min, max) {
        var num = Number(value);
        if (!isFinite(num)) return fallback;
        if (num < min) return fallback;
        if (num > max) return fallback;
        return Math.round(num);
      }

      function normalize(value) {
        return (value || "").replace(/\s+/g, " ").trim().toLowerCase();
      }

      function textElements(root) {
        return Array.prototype.slice.call(root.querySelectorAll("h1,h2,h3,h4,p,span,button,div,label"));
      }

      function headingElements(root) {
        return Array.prototype.slice.call(root.querySelectorAll("h1,h2,h3,h4"));
      }

      function hasAny(text, variants) {
        var n = normalize(text);
        return variants.some(function (v) { return n.indexOf(normalize(v)) !== -1; });
      }

      function findHeading(root, variants) {
        return headingElements(root).find(function (el) { return hasAny(el.textContent, variants); }) || null;
      }

      function closestSectionLike(el) {
        if (!el) return null;
        return el.closest("section, article, [data-slot], .container, .max-w-\\[1440px\\], .max-w-\\[1400px\\], .max-w-\\[1420px\\]") || el.parentElement;
      }

      function sectionByIdOrHeading(id, fallbackHeadings) {
        var byId = document.getElementById(id);
        if (byId) return byId;
        var heading = findHeading(document.body, fallbackHeadings);
        return heading ? closestSectionLike(heading) : null;
      }

      function hideSectionBody(section, heading) {
        if (!section || !heading) return;
        var keep = new Set();
        var node = heading;
        while (node && node !== section) {
          keep.add(node);
          node = node.parentElement;
        }

        Array.prototype.slice.call(section.children).forEach(function (child) {
          if (!keep.has(child)) child.classList.add("liza-old-content");
        });
      }

      function firstHeading(section) {
        if (!section) return null;
        return section.querySelector("h1,h2,h3,h4");
      }

      function clearManagedBlock(section, key) {
        if (!section) return;
        var old = section.querySelector('[data-liza-managed="' + key + '"]');
        if (old) old.remove();
      }

      function sectionContentRoot(section) {
        if (!section) return null;
        return section.firstElementChild || section;
      }

      function sanitizeConfig(raw) {
        var clean = clone(DEFAULT_CONFIG);
        var src = asObject(raw);
        if (!src) return clean;

        var srcCopy = asObject(src.copy);
        if (srcCopy) {
          clean.copy.resultHeading = safeString(srcCopy.resultHeading, clean.copy.resultHeading, 160);
          clean.copy.resultLead = safeString(srcCopy.resultLead, clean.copy.resultLead, 480);
          clean.copy.pricingHeading = safeString(srcCopy.pricingHeading, clean.copy.pricingHeading, 120);
          clean.copy.pricingRowTitle = safeString(srcCopy.pricingRowTitle, clean.copy.pricingRowTitle, 120);
          clean.copy.summaryIncludedLabel = safeString(srcCopy.summaryIncludedLabel, clean.copy.summaryIncludedLabel, 80);
          clean.copy.summarySelectedLabel = safeString(srcCopy.summarySelectedLabel, clean.copy.summarySelectedLabel, 80);
          clean.copy.summaryExtraLabel = safeString(srcCopy.summaryExtraLabel, clean.copy.summaryExtraLabel, 80);
          clean.copy.fullTextPlaceholder = safeString(srcCopy.fullTextPlaceholder, clean.copy.fullTextPlaceholder, 300);

          if (Array.isArray(srcCopy.resultCards) && srcCopy.resultCards.length > 0) {
            clean.copy.resultCards = srcCopy.resultCards.slice(0, 6).map(function (card, idx) {
              var fallback = DEFAULT_CONFIG.copy.resultCards[idx] || DEFAULT_CONFIG.copy.resultCards[0];
              var srcCard = asObject(card) || {};
              return {
                title: safeString(srcCard.title, fallback.title, 120),
                body: safeString(srcCard.body, fallback.body, 360),
                metric: safeString(srcCard.metric, fallback.metric, 120)
              };
            });
          }

          if (asObject(srcCopy.selectorTextMap)) {
            clean.copy.selectorTextMap = srcCopy.selectorTextMap;
          }
          if (asObject(srcCopy.fullTextMap)) {
            clean.copy.fullTextMap = srcCopy.fullTextMap;
          }
        }

        var srcPricing = asObject(src.pricing);
        if (srcPricing) {
          clean.pricing.currency = safeString(srcPricing.currency, clean.pricing.currency, 6);
          clean.pricing.perMonthSuffix = safeString(srcPricing.perMonthSuffix, clean.pricing.perMonthSuffix, 24);
          clean.pricing.extraMessengerPrice = safeNumber(srcPricing.extraMessengerPrice, clean.pricing.extraMessengerPrice, 0, 100000);

          if (Array.isArray(srcPricing.plans) && srcPricing.plans.length >= 3) {
            clean.pricing.plans = srcPricing.plans.slice(0, 3).map(function (plan, idx) {
              var fallback = DEFAULT_CONFIG.pricing.plans[idx] || DEFAULT_CONFIG.pricing.plans[0];
              var srcPlan = asObject(plan) || {};
              return {
                key: safeString(srcPlan.key, fallback.key, 32),
                name: safeString(srcPlan.name, fallback.name, 64),
                basePrice: safeNumber(srcPlan.basePrice, fallback.basePrice, 0, 1000000),
                messagesLabel: safeString(srcPlan.messagesLabel, fallback.messagesLabel, 120),
                includedMessengers: safeNumber(srcPlan.includedMessengers, fallback.includedMessengers, 0, 99),
                allMessengersIncluded: Boolean(srcPlan.allMessengersIncluded)
              };
            });
          }

          if (Array.isArray(srcPricing.messengers) && srcPricing.messengers.length > 0) {
            clean.pricing.messengers = srcPricing.messengers.slice(0, 8).map(function (item, idx) {
              var fallback = DEFAULT_CONFIG.pricing.messengers[idx] || DEFAULT_CONFIG.pricing.messengers[0];
              var srcItem = asObject(item) || {};
              return {
                key: safeString(srcItem.key, fallback.key, 32),
                label: safeString(srcItem.label, fallback.label, 48),
                checkedByDefault: typeof srcItem.checkedByDefault === "boolean" ? srcItem.checkedByDefault : fallback.checkedByDefault
              };
            });
          }
        }

        var srcBehavior = asObject(src.behavior);
        if (srcBehavior && typeof srcBehavior.rebuildManagedSections === "boolean") {
          clean.behavior.rebuildManagedSections = srcBehavior.rebuildManagedSections;
        }
        if (srcBehavior && typeof srcBehavior.fullTextControl === "boolean") {
          clean.behavior.fullTextControl = srcBehavior.fullTextControl;
        }
        if (srcBehavior && (srcBehavior.fullTextMode === "replace" || srcBehavior.fullTextMode === "collect")) {
          clean.behavior.fullTextMode = srcBehavior.fullTextMode;
        }
        if (srcBehavior && typeof srcBehavior.placeholderWithKey === "boolean") {
          clean.behavior.placeholderWithKey = srcBehavior.placeholderWithKey;
        }

        return clean;
      }

      function fmtMoney(value, cfg) {
        return String(value) + " " + cfg.pricing.currency;
      }

      function renderResultSection(cfg) {
        var section = sectionByIdOrHeading("proof", ["Почему нас выбирают", "Что меняется после запуска", "Результат", "Кейсы"]);
        if (!section) return false;
        var root = sectionContentRoot(section);
        if (!root) return false;
        root.replaceChildren();

        var headingWrap = document.createElement("div");
        headingWrap.className = "mb-12 text-center";
        var heading = document.createElement("h2");
        heading.className = "mb-4 text-5xl font-bold text-gray-900 lg:text-6xl";
        heading.textContent = cfg.copy.resultHeading;
        var sub = document.createElement("p");
        sub.className = "text-xl text-gray-700 max-w-4xl mx-auto";
        sub.textContent = "Практичный блок о том, что бизнес получает на запуске, без абстрактных обещаний.";
        headingWrap.appendChild(heading);
        headingWrap.appendChild(sub);
        root.appendChild(headingWrap);

        var wrap = document.createElement("div");
        wrap.className = "liza-results-rebuild";
        wrap.setAttribute("data-liza-managed", "result");

        var lead = document.createElement("div");
        lead.className = "liza-results-lead";
        lead.textContent = cfg.copy.resultLead;
        wrap.appendChild(lead);

        var icons = ["✓", "⏱", "★", "↺", "💬", "⚑"];
        var grid = document.createElement("div");
        grid.className = "liza-results-grid";
        cfg.copy.resultCards.forEach(function (card, idx) {
          var article = document.createElement("article");
          article.className = "liza-results-card";

          var head = document.createElement("div");
          head.className = "liza-results-head";

          var icon = document.createElement("span");
          icon.className = "liza-results-icon";
          icon.textContent = icons[idx % icons.length];

          var t = document.createElement("h3");
          t.className = "liza-results-title";
          t.textContent = card.title;

          head.appendChild(icon);
          head.appendChild(t);

          var b = document.createElement("p");
          b.className = "liza-results-copy";
          b.textContent = card.body;

          var m = document.createElement("div");
          m.className = "liza-results-metric";
          m.textContent = card.metric;

          article.appendChild(head);
          article.appendChild(b);
          article.appendChild(m);
          grid.appendChild(article);
        });
        wrap.appendChild(grid);

        var launch = document.createElement("div");
        launch.className = "liza-launch-card";
        var launchTitle = document.createElement("h3");
        launchTitle.className = "liza-launch-title";
        launchTitle.textContent = "Как запускаем за 1 день";
        launch.appendChild(launchTitle);

        var steps = [
          "Синхронизируем с YClients и проверяем каналы отправки.",
          "Настраиваем шаблоны и таймеры под ваши услуги.",
          "Включаем сценарии и смотрим первые ответы клиентов."
        ];
        var launchGrid = document.createElement("div");
        launchGrid.className = "liza-launch-grid";
        steps.forEach(function (text, idx) {
          var step = document.createElement("div");
          step.className = "liza-launch-step";
          var num = document.createElement("span");
          num.className = "liza-launch-num";
          num.textContent = String(idx + 1);
          step.appendChild(num);
          step.appendChild(document.createTextNode(text));
          launchGrid.appendChild(step);
        });
        launch.appendChild(launchGrid);
        wrap.appendChild(launch);

        root.appendChild(wrap);
        return true;
      }

      function renderPricingSection(cfg) {
        var section = sectionByIdOrHeading("pricing", ["Тарифы и калькулятор", "Тарифы"]);
        if (!section) return false;
        var root = sectionContentRoot(section);
        if (!root) return false;
        root.replaceChildren();

        var headingWrap = document.createElement("div");
        headingWrap.className = "text-center mb-12";
        var heading = document.createElement("h2");
        heading.className = "text-5xl lg:text-6xl font-bold text-gray-900 mb-4";
        heading.textContent = cfg.copy.pricingHeading;
        var sub = document.createElement("p");
        sub.className = "text-xl text-gray-700 max-w-3xl mx-auto";
        sub.textContent = "Выбираете тариф и каналы. Цена зависит только от тарифа и количества подключенных мессенджеров.";
        headingWrap.appendChild(heading);
        headingWrap.appendChild(sub);
        root.appendChild(headingWrap);

        var shell = document.createElement("div");
        shell.className = "liza-pricing-shell";

        var widget = document.createElement("div");
        widget.className = "liza-pricing-widget";
        widget.setAttribute("data-liza-managed", "pricing");

        var plansGrid = document.createElement("div");
        plansGrid.className = "liza-pricing-grid";

        cfg.pricing.plans.forEach(function (plan, idx) {
          var label = document.createElement("label");
          label.className = "liza-plan" + (idx === 0 ? " active" : "");
          label.setAttribute("data-plan", plan.key);

          var input = document.createElement("input");
          input.type = "radio";
          input.name = "liza-plan";
          input.value = plan.key;
          if (idx === 0) input.checked = true;

          var name = document.createElement("p");
          name.className = "liza-plan-name";
          name.textContent = plan.name;

          var price = document.createElement("p");
          price.className = "liza-plan-price";
          price.textContent = fmtMoney(plan.basePrice, cfg);

          var meta = document.createElement("p");
          meta.className = "liza-plan-meta";
          meta.appendChild(document.createTextNode(plan.messagesLabel));
          meta.appendChild(document.createElement("br"));
          meta.appendChild(document.createTextNode(plan.allMessengersIncluded ? "Все мессенджеры включены" : "1 мессенджер включен"));

          label.appendChild(input);
          label.appendChild(name);
          label.appendChild(price);
          label.appendChild(meta);
          plansGrid.appendChild(label);
        });
        widget.appendChild(plansGrid);

        var rowTitle = document.createElement("p");
        rowTitle.className = "liza-pricing-row-title";
        rowTitle.textContent = cfg.copy.pricingRowTitle;
        widget.appendChild(rowTitle);

        var messengerRow = document.createElement("div");
        messengerRow.className = "liza-messenger-row";
        cfg.pricing.messengers.forEach(function (ms) {
          var msLabel = document.createElement("label");
          msLabel.className = "liza-ms-item";

          var checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.value = ms.key;
          checkbox.checked = !!ms.checkedByDefault;

          msLabel.appendChild(checkbox);
          msLabel.appendChild(document.createTextNode(ms.label));
          messengerRow.appendChild(msLabel);
        });
        widget.appendChild(messengerRow);

        var noteGrid = document.createElement("div");
        noteGrid.className = "liza-pricing-note-grid";

        var note1 = document.createElement("div");
        note1.className = "liza-pricing-note";
        note1.innerHTML = "<strong>Логика расчета</strong>Стоимость = тариф + доплата за дополнительные мессенджеры.";
        noteGrid.appendChild(note1);

        var note2 = document.createElement("div");
        note2.className = "liza-pricing-note";
        note2.innerHTML = "<strong>Без скрытых условий</strong>Цена обновляется сразу по выбранным параметрам.";
        noteGrid.appendChild(note2);
        widget.appendChild(noteGrid);

        var aside = document.createElement("aside");
        aside.className = "liza-pricing-aside";

        var kicker = document.createElement("p");
        kicker.className = "liza-aside-kicker";
        kicker.textContent = "Рекомендованный тариф по параметрам";
        aside.appendChild(kicker);

        var summaryPlan = document.createElement("h3");
        summaryPlan.className = "liza-aside-title";
        summaryPlan.setAttribute("data-summary-plan", "true");
        aside.appendChild(summaryPlan);

        var summary = document.createElement("div");
        summary.className = "liza-pricing-summary";

        var summaryPrice = document.createElement("div");
        summaryPrice.className = "liza-summary-big";
        summaryPrice.setAttribute("data-summary-price", "true");

        var summaryMessages = document.createElement("div");
        summaryMessages.className = "liza-summary-line";
        summaryMessages.setAttribute("data-summary-msg", "true");

        var summaryMs = document.createElement("div");
        summaryMs.className = "liza-summary-line";
        summaryMs.setAttribute("data-summary-ms", "true");

        var summaryExtra = document.createElement("div");
        summaryExtra.className = "liza-summary-line";
        summaryExtra.setAttribute("data-summary-extra", "true");

        summary.appendChild(summaryPrice);
        summary.appendChild(summaryMessages);
        summary.appendChild(summaryMs);
        summary.appendChild(summaryExtra);
        aside.appendChild(summary);

        var cta = document.createElement("a");
        cta.className = "liza-pricing-cta";
        cta.href = "#lead-form";
        cta.textContent = "Получить расчет и запуск";
        aside.appendChild(cta);

        shell.appendChild(widget);
        shell.appendChild(aside);
        root.appendChild(shell);

        function selectedPlanKey() {
          var selected = widget.querySelector('input[name="liza-plan"]:checked');
          return selected ? selected.value : cfg.pricing.plans[0].key;
        }

        function selectedMsCount() {
          return Array.prototype.slice.call(widget.querySelectorAll('.liza-messenger-row input[type="checkbox"]:checked')).length;
        }

        function syncMessengerLabelState() {
          widget.querySelectorAll(".liza-ms-item").forEach(function (label) {
            var box = label.querySelector('input[type="checkbox"]');
            label.classList.toggle("active", !!box && box.checked);
          });
        }

        function syncPricing() {
          var key = selectedPlanKey();
          var plan = cfg.pricing.plans.find(function (x) { return x.key === key; }) || cfg.pricing.plans[0];
          var allBoxes = Array.prototype.slice.call(widget.querySelectorAll('.liza-messenger-row input[type="checkbox"]'));

          widget.querySelectorAll(".liza-plan").forEach(function (card) {
            card.classList.toggle("active", card.getAttribute("data-plan") === key);
          });

          if (plan.allMessengersIncluded) {
            allBoxes.forEach(function (box) {
              box.checked = true;
              box.disabled = true;
            });
          } else {
            allBoxes.forEach(function (box) {
              box.disabled = false;
            });
            if (selectedMsCount() === 0 && allBoxes[0]) allBoxes[0].checked = true;
          }

          var selected = selectedMsCount();
          var extraUnits = plan.allMessengersIncluded ? 0 : Math.max(0, selected - plan.includedMessengers);
          var extra = extraUnits * cfg.pricing.extraMessengerPrice;
          var total = plan.basePrice + extra;

          summaryPlan.textContent = plan.name;
          summaryPrice.textContent = fmtMoney(total, cfg) + " " + cfg.pricing.perMonthSuffix;
          summaryMessages.textContent = "Лимит: " + plan.messagesLabel;
          if (plan.allMessengersIncluded) {
            summaryMs.textContent = "Каналы: все включены";
          } else {
            summaryMs.textContent = cfg.copy.summaryIncludedLabel + ": " + plan.includedMessengers + ". " + cfg.copy.summarySelectedLabel + ": " + selected + ".";
          }
          summaryExtra.textContent = cfg.copy.summaryExtraLabel + ": " + fmtMoney(extra, cfg);
          syncMessengerLabelState();
        }

        widget.addEventListener("change", syncPricing);
        syncPricing();
        return true;
      }

      function applySelectorOverrides(cfg) {
        var map = asObject(cfg.copy.selectorTextMap);
        if (!map) return 0;
        var applied = 0;
        Object.keys(map).forEach(function (selector) {
          var text = safeString(map[selector], "", 600);
          if (!text) return;
          var node = document.querySelector(selector);
          if (node) {
            node.textContent = text;
            applied += 1;
          }
        });
        return applied;
      }

      function shouldSkipNodeByParent(parent) {
        if (!parent || !parent.tagName) return true;
        var tag = parent.tagName.toLowerCase();
        if (["script", "style", "noscript", "template", "svg", "path"].indexOf(tag) !== -1) return true;
        if (parent.closest && parent.closest("script,style,noscript,template,svg,path")) return true;
        return false;
      }

      function cssPath(el) {
        var parts = [];
        var node = el;
        while (node && node.nodeType === 1 && node !== document.body) {
          var tag = node.tagName.toLowerCase();
          var part = tag;
          if (node.id) {
            part += "#" + node.id;
            parts.unshift(part);
            break;
          } else {
            var index = 1;
            var sib = node;
            while ((sib = sib.previousElementSibling)) {
              if (sib.tagName === node.tagName) index += 1;
            }
            part += ":nth-of-type(" + index + ")";
            parts.unshift(part);
          }
          node = node.parentElement;
        }
        parts.unshift("body");
        return parts.join(">");
      }

      function slugify(value) {
        return String(value || "")
          .toLowerCase()
          .replace(/[^a-z0-9а-яё]+/gi, "_")
          .replace(/^_+|_+$/g, "")
          .slice(0, 60) || "common";
      }

      function inferSectionName(el) {
        var section = el.closest("section,article,main,header,footer,[id],[data-slot]");
        if (!section) return "common";
        if (section.id) return slugify(section.id);
        var heading = section.querySelector("h1,h2,h3");
        if (heading) return slugify((heading.textContent || "").trim());
        var cls = section.className && typeof section.className === "string" ? section.className.split(/\s+/)[0] : "";
        return slugify(cls || section.tagName.toLowerCase());
      }

      function hashPath(str) {
        var h = 2166136261;
        for (var i = 0; i < str.length; i += 1) {
          h ^= str.charCodeAt(i);
          h += (h << 1) + (h << 4) + (h << 7) + (h << 8) + (h << 24);
        }
        return (h >>> 0).toString(16);
      }

      function ensureOwnerKey(el) {
        if (!el.hasAttribute("data-liza-text-owner")) {
          var key = "o_" + hashPath(cssPath(el));
          el.setAttribute("data-liza-text-owner", key);
        }
        return el.getAttribute("data-liza-text-owner");
      }

      function pickMappedValue(map, key, placeholder, withKey) {
        var candidate = safeString(map[key], "", 600);
        if (candidate) return candidate;
        if (withKey) return placeholder + " [" + key + "]";
        return placeholder;
      }

      function upsertExportMapNode(mapObj) {
        var id = "liza-fulltext-map-json";
        var node = document.getElementById(id);
        if (!node) {
          node = document.createElement("script");
          node.id = id;
          node.type = "application/json";
          document.body.appendChild(node);
        }
        node.textContent = JSON.stringify(mapObj, null, 2);
      }

      function upsertExportMetaNode(metaObj) {
        var id = "liza-fulltext-meta-json";
        var node = document.getElementById(id);
        if (!node) {
          node = document.createElement("script");
          node.id = id;
          node.type = "application/json";
          document.body.appendChild(node);
        }
        node.textContent = JSON.stringify(metaObj, null, 2);
      }

      function enforceRuntimeFlags(cfg) {
        if (!cfg || !cfg.behavior) return;
        if (forceFullTextExport) {
          cfg.behavior.fullTextControl = true;
          cfg.behavior.fullTextMode = "collect";
        }
      }

      function applyFullTextControl(cfg) {
        if (!cfg.behavior || !cfg.behavior.fullTextControl) return 0;
        var fullMap = asObject(cfg.copy.fullTextMap) || {};
        var placeholder = safeString(cfg.copy.fullTextPlaceholder, "placeholder", 300);
        var isCollectMode = cfg.behavior.fullTextMode === "collect";
        var withKey = !!cfg.behavior.placeholderWithKey;
        var ownerNodeIndex = new Map();
        var exportMap = {};
        var exportMeta = {};
        var applied = 0;

        var walker = document.createTreeWalker(
          document.body,
          NodeFilter.SHOW_TEXT,
          {
            acceptNode: function (node) {
              var parent = node.parentElement;
              if (!parent) return NodeFilter.FILTER_REJECT;
              if (shouldSkipNodeByParent(parent)) return NodeFilter.FILTER_REJECT;
              var raw = (node.nodeValue || "").replace(/\s+/g, " ").trim();
              if (!raw) return NodeFilter.FILTER_REJECT;
              return NodeFilter.FILTER_ACCEPT;
            }
          }
        );

        var textNode = walker.nextNode();
        while (textNode) {
          var owner = textNode.parentElement;
          var ownerKey = ensureOwnerKey(owner);
          var nodeIdx = (ownerNodeIndex.get(ownerKey) || 0) + 1;
          ownerNodeIndex.set(ownerKey, nodeIdx);
          var textKey = ownerKey + ".n" + nodeIdx;
          if (isCollectMode) {
            var srcText = (textNode.nodeValue || "").replace(/\s+/g, " ").trim();
            exportMap[textKey] = srcText;
            exportMeta[textKey] = {
              kind: "text",
              section: inferSectionName(owner),
              selector: cssPath(owner),
              sample: srcText.slice(0, 120)
            };
          } else {
            var textValue = pickMappedValue(fullMap, textKey, placeholder, withKey);
            if (textNode.nodeValue !== textValue) {
              textNode.nodeValue = textValue;
              applied += 1;
            }
          }
          textNode = walker.nextNode();
        }

        var controls = Array.prototype.slice.call(document.body.querySelectorAll("input,textarea,button,[placeholder],[aria-label]"));
        controls.forEach(function (el) {
          if (shouldSkipNodeByParent(el)) return;
          var ownerKey = ensureOwnerKey(el);

          if (el.hasAttribute("placeholder")) {
            var phKey = ownerKey + ".placeholder";
            if (isCollectMode) {
              var phText = el.getAttribute("placeholder") || "";
              exportMap[phKey] = phText;
              exportMeta[phKey] = {
                kind: "placeholder",
                section: inferSectionName(el),
                selector: cssPath(el),
                sample: phText.slice(0, 120)
              };
            } else {
              var phValue = pickMappedValue(fullMap, phKey, placeholder, withKey);
              if (el.getAttribute("placeholder") !== phValue) {
                el.setAttribute("placeholder", phValue);
                applied += 1;
              }
            }
          }

          if (el.hasAttribute("aria-label")) {
            var ariaKey = ownerKey + ".aria";
            if (isCollectMode) {
              var ariaText = el.getAttribute("aria-label") || "";
              exportMap[ariaKey] = ariaText;
              exportMeta[ariaKey] = {
                kind: "aria",
                section: inferSectionName(el),
                selector: cssPath(el),
                sample: ariaText.slice(0, 120)
              };
            } else {
              var ariaValue = pickMappedValue(fullMap, ariaKey, placeholder, withKey);
              if (el.getAttribute("aria-label") !== ariaValue) {
                el.setAttribute("aria-label", ariaValue);
                applied += 1;
              }
            }
          }

          if (el.tagName === "INPUT") {
            var inputType = (el.getAttribute("type") || "text").toLowerCase();
            if (["hidden", "checkbox", "radio", "range", "file", "color", "date", "datetime-local", "month", "time", "week"].indexOf(inputType) === -1) {
              var valKey = ownerKey + ".value";
              if (isCollectMode) {
                var inText = el.value || "";
                exportMap[valKey] = inText;
                exportMeta[valKey] = {
                  kind: "value",
                  section: inferSectionName(el),
                  selector: cssPath(el),
                  sample: inText.slice(0, 120)
                };
              } else {
                var valValue = pickMappedValue(fullMap, valKey, placeholder, withKey);
                if (el.value !== valValue) {
                  el.value = valValue;
                  applied += 1;
                }
              }
            }
          } else if (el.tagName === "TEXTAREA") {
            var taKey = ownerKey + ".value";
            if (isCollectMode) {
              var taText = el.value || "";
              exportMap[taKey] = taText;
              exportMeta[taKey] = {
                kind: "value",
                section: inferSectionName(el),
                selector: cssPath(el),
                sample: taText.slice(0, 120)
              };
            } else {
              var taValue = pickMappedValue(fullMap, taKey, placeholder, withKey);
              if (el.value !== taValue) {
                el.value = taValue;
                applied += 1;
              }
            }
          }
        });

        if (isCollectMode) {
          upsertExportMapNode(exportMap);
          upsertExportMetaNode(exportMeta);
          try {
            window.parent.postMessage({ type: "LIZA_FULLTEXT_EXPORT_READY", payload: exportMap, meta: exportMeta }, "*");
          } catch (_e) {
            // no-op
          }
          return Object.keys(exportMap).length;
        }

        return applied;
      }

      function applyConfigToDom() {
        if (!document.body) return false;
        var changed = false;
        if (runtimeConfig.behavior && runtimeConfig.behavior.rebuildManagedSections) {
          var resultOk = renderResultSection(runtimeConfig);
          var pricingOk = renderPricingSection(runtimeConfig);
          changed = resultOk || pricingOk;
        }
        var fullTextAppliedCount = applyFullTextControl(runtimeConfig);
        var textAppliedCount = applySelectorOverrides(runtimeConfig);
        return changed || fullTextAppliedCount > 0 || textAppliedCount > 0;
      }

      function scheduleApply() {
        if (queuedApply) clearInterval(queuedApply);
        var attempts = 0;
        var maxAttempts = 40;
        queuedApply = setInterval(function () {
          attempts += 1;
          var changed = applyConfigToDom();
          if (pendingConfigAck && (changed || attempts >= 2)) {
            pendingConfigAck = false;
            try {
              window.parent.postMessage({ type: "LIZA_CONFIG_APPLIED", version: 1 }, "*");
            } catch (_e) {
              // no-op
            }
          }
          if (changed && attempts > 2) {
            clearInterval(queuedApply);
            queuedApply = null;
          } else if (attempts >= maxAttempts) {
            clearInterval(queuedApply);
            queuedApply = null;
          }
        }, 250);
      }

      function applyIncomingConfig(rawPayload) {
        runtimeConfig = sanitizeConfig(rawPayload);
        enforceRuntimeFlags(runtimeConfig);
        pendingConfigAck = true;
        scheduleApply();
      }

      function tryParseJson(value) {
        if (typeof value !== "string") return value;
        try {
          return JSON.parse(value);
        } catch (_e) {
          return null;
        }
      }

      function hasHttpOrigin(origin) {
        if (!origin || origin === "null") return false;
        return /^https?:\/\//i.test(origin);
      }

      window.addEventListener("message", function (event) {
        if (event.source !== window.parent) return;
        if (!hasHttpOrigin(event.origin)) return;

        var data = tryParseJson(event.data);
        if (!data || typeof data !== "object") return;
        if (data.type !== "LIZA_CONFIG_V1") return;
        applyIncomingConfig(data.payload);
      });

      window.addEventListener("load", function () {
        enforceRuntimeFlags(runtimeConfig);
        scheduleApply();
        try {
          window.parent.postMessage({ type: "LIZA_CONFIG_IFRAME_READY", version: 1 }, "*");
        } catch (_e) {
          // no-op
        }
      }, { once: true });
    })();
  </script>
</body>
</html>
