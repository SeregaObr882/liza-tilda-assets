<body>

  <script>
    (function () {
      function normalize(value) {
        return (value || "").replace(/\s+/g, " ").trim().toLowerCase();
      }

      function textElements(root) {
        return Array.prototype.slice.call(root.querySelectorAll("h1,h2,h3,h4,p,span,button,div,label"));
      }

      function headingElements(root) {
        return Array.prototype.slice.call(root.querySelectorAll("h1,h2,h3,h4"));
      }

      function hasAny(text, variants) {
        var n = normalize(text);
        return variants.some(function (v) { return n.indexOf(normalize(v)) !== -1; });
      }

      function findHeading(root, variants) {
        return headingElements(root).find(function (el) { return hasAny(el.textContent, variants); }) || null;
      }

      function closestSectionLike(el) {
        if (!el) return null;
        return el.closest("section, article, [data-slot], .container, .max-w-\\[1440px\\], .max-w-\\[1400px\\], .max-w-\\[1420px\\]") || el.parentElement;
      }

      function hideSectionBody(section, heading) {
        var keep = new Set();
        var node = heading;
        while (node && node !== section) {
          keep.add(node);
          node = node.parentElement;
        }

        Array.prototype.slice.call(section.children).forEach(function (child) {
          if (!keep.has(child)) child.classList.add("liza-old-content");
        });
      }

      function rebuildResultSection(root) {
        var heading = findHeading(root, ["Р В§РЎвҖҡР С• РЎРӮР ВөР В°Р В»РЎРҠР Р…Р С• Р Т‘Р В°РЎРғРЎвҖҡ РЎРӮР ВөР В·РЎС“Р В»РЎРҠРЎвҖҡР В°РЎвҖҡ", "Р В§РЎвҖҡР С• РЎРӮР ВөР В°Р В»РЎРҠР Р…Р С• Р Т‘Р В°Р ВөРЎвҖҡ РЎРӮР ВөР В·РЎС“Р В»РЎРҠРЎвҖҡР В°РЎвҖҡ", "Р В§РЎвҖҡР С• РЎРӮР ВөР В°Р В»РЎРҠР Р…Р С• РЎРӮР В°Р ВұР С•РЎвҖҡР В°Р ВөРЎвҖҡ Р РҶ Р СҳР С•Р Т‘РЎС“Р В»Р Вө", "Р В Р’В§Р РҺРІРӮСҷР В РЎвҖў Р РҺР вҖҡР В Р’ВөР В Р’В°Р В Р’В»Р РҺР РүР В Р вҖҰР В РЎвҖў"]);
        if (!heading) return;
        var section = closestSectionLike(heading);
        if (!section || section.querySelector(".liza-results-rebuild")) return;

            '<article class="liza-results-card"><h3 class="liza-results-title">Р вҖҷР С•Р В·Р РҶРЎРӮР В°РЎвҖҡ Р С—Р С•РЎвҖҡР ВөРЎРӮРЎРҸР Р…Р Р…РЎвҖ№РЎвҖҰ Р С”Р В»Р С‘Р ВөР Р…РЎвҖҡР С•Р РҶ</h3><p class="liza-results-copy">Р СҹР С•РЎРғР В»Р Вө Р С•РЎвҖҡР СҳР ВөР Р…РЎвҖ№ Р С‘Р В»Р С‘ РЎРғРЎвҖҡР В°РЎвҖҡРЎС“РЎРғР В° "Р Р…Р Вө Р С—РЎРӮР С‘РЎвӮ¬Р ВөР В»" Р С”Р В»Р С‘Р ВөР Р…РЎвҖҡ Р РҶР С•Р В·Р РҶРЎРӮР В°РЎвҖ°Р В°Р ВөРЎвҖҡРЎРғРЎРҸ Р РҶ Р Т‘Р С‘Р В°Р В»Р С•Р С– РЎРғ Р С—РЎРӮР ВөР Т‘Р В»Р С•Р В¶Р ВөР Р…Р С‘Р ВөР Сҳ РЎС“Р Т‘Р С•Р ВұР Р…Р С•Р С–Р С• Р РҶРЎРӮР ВөР СҳР ВөР Р…Р С‘.</p><div class="liza-results-metric">Р ВӨР С•Р С”РЎС“РЎРғ KPI: Р С—Р С•Р РҶРЎвҖҡР С•РЎРӮР Р…РЎвҖ№Р Вө Р В·Р В°Р С—Р С‘РЎРғР С‘</div></article>' +
            '<article class="liza-results-card"><h3 class="liza-results-title">Р В Р С•РЎРғРЎвҖҡ РЎРӮР ВөР в„–РЎвҖҡР С‘Р Р…Р С–Р В° Р С‘ Р С•РЎвҖҡР В·РЎвҖ№Р РҶР С•Р РҶ</h3><p class="liza-results-copy">Р СҹР С•Р В·Р С‘РЎвҖҡР С‘Р РҶР Р…РЎвҖ№РЎвҖҰ Р С”Р В»Р С‘Р ВөР Р…РЎвҖҡР С•Р РҶ Р С•РЎвҖҡР С—РЎРӮР В°Р РҶР В»РЎРҸР ВөР Сҳ Р РҶ Р С•РЎвҖҡР В·РЎвҖ№Р РҶРЎвҖ№, Р В° Р Р…Р ВөР С–Р В°РЎвҖҡР С‘Р РҶ РЎРғРЎРӮР В°Р В·РЎС“ РЎС“РЎвҖҰР С•Р Т‘Р С‘РЎвҖҡ Р В°Р Т‘Р СҳР С‘Р Р…РЎС“ Р Т‘Р В»РЎРҸ Р ВұРЎвҖ№РЎРғРЎвҖҡРЎРӮР С•Р С–Р С• РЎРӮР ВөРЎвӮ¬Р ВөР Р…Р С‘РЎРҸ.</p><div class="liza-results-metric">Р ВӨР С•Р С”РЎС“РЎРғ KPI: РЎРӮР ВөР в„–РЎвҖҡР С‘Р Р…Р С– Р С‘ NPS</div></article>' +

          '</div>';

        section.appendChild(block);
      }

      function rebuildPricing(root) {
        var heading = findHeading(root, ["Р СһР В°РЎРӮР С‘РЎвҖһРЎвҖ№ Р С‘ Р С”Р В°Р В»РЎРҠР С”РЎС“Р В»РЎРҸРЎвҖҡР С•РЎРӮ", "Р СһР В°РЎРӮР С‘РЎвҖһРЎвҖ№", "Р В РЎСӣР В Р’В°Р РҺР вҖҡР В РЎвҖҳР РҺРІРӮСӣР РҺРІРӮв„–"]);
        if (!heading) return;
        var section = closestSectionLike(heading);
        if (!section || section.querySelector(".liza-pricing-widget")) return;

        hideSectionBody(section, heading);

        var widget = document.createElement("div");
        widget.className = "liza-pricing-widget";
        widget.innerHTML =
          '<div class="liza-pricing-grid">' +
            '<label class="liza-plan active" data-plan="start"><input type="radio" name="liza-plan" value="start" checked><p class="liza-plan-name">Р РҺРЎвҖҡР В°РЎРӮРЎвҖҡ</p><p class="liza-plan-price">999 РІвҖҡР…</p><p class="liza-plan-meta">300 РЎРғР С•Р С•Р ВұРЎвҖ°Р ВөР Р…Р С‘Р в„–<br>1 Р СҳР ВөРЎРғРЎРғР ВөР Р…Р Т‘Р В¶Р ВөРЎРӮ Р РҶР С”Р В»РЎРӢРЎвҖЎР ВөР Р…</p></label>' +
            '<label class="liza-plan" data-plan="standard"><input type="radio" name="liza-plan" value="standard"><p class="liza-plan-name">Р РҺРЎвҖҡР В°Р Р…Р Т‘Р В°РЎРӮРЎвҖҡ</p><p class="liza-plan-price">1999 РІвҖҡР…</p><p class="liza-plan-meta">1000 РЎРғР С•Р С•Р ВұРЎвҖ°Р ВөР Р…Р С‘Р в„–<br>1 Р СҳР ВөРЎРғРЎРғР ВөР Р…Р Т‘Р В¶Р ВөРЎРӮ Р РҶР С”Р В»РЎРӢРЎвҖЎР ВөР Р…</p></label>' +
            '<label class="liza-plan" data-plan="max"><input type="radio" name="liza-plan" value="max"><p class="liza-plan-name">Р СҡР В°Р С”РЎРғР С‘Р СҳРЎС“Р Сҳ</p><p class="liza-plan-price">3999 РІвҖҡР…</p><p class="liza-plan-meta">Р Т‘Р С• 3000 РЎРғР С•Р С•Р ВұРЎвҖ°Р ВөР Р…Р С‘Р в„–<br>Р РҶРЎРғР Вө Р СҳР ВөРЎРғРЎРғР ВөР Р…Р Т‘Р В¶Р ВөРЎРӮРЎвҖ№ Р РҶР С”Р В»РЎРӢРЎвҖЎР ВөР Р…РЎвҖ№</p></label>' +
          '</div>' +
          '<p class="liza-pricing-row-title">Р вҖҷРЎвҖ№Р ВұР ВөРЎРӮР С‘РЎвҖҡР Вө Р СҳР ВөРЎРғРЎРғР ВөР Р…Р Т‘Р В¶Р ВөРЎРӮРЎвҖ№:</p>' +

          '</div>' +
          '<div class="liza-pricing-summary">' +
            '<div class="liza-summary-big" data-summary-price>999 РІвҖҡР… / Р СҳР ВөРЎРғ</div>' +
            '<div class="liza-summary-line" data-summary-msg>Р вҖәР С‘Р СҳР С‘РЎвҖҡ: 300 РЎРғР С•Р С•Р ВұРЎвҖ°Р ВөР Р…Р С‘Р в„– Р РҶ Р СҳР ВөРЎРғРЎРҸРЎвҖ </div>' +
            '<div class="liza-summary-line" data-summary-ms>Р вҖҷР С”Р В»РЎРӢРЎвҖЎР ВөР Р…Р С•: 1 Р СҳР ВөРЎРғРЎРғР ВөР Р…Р Т‘Р В¶Р ВөРЎРӮ. Р СҷР В°Р В¶Р Т‘РЎвҖ№Р в„– Р Т‘Р С•Р С—Р С•Р В»Р Р…Р С‘РЎвҖҡР ВөР В»РЎРҠР Р…РЎвҖ№Р в„–: +750 РІвҖҡР…</div>' +
          '</div>';

        section.appendChild(widget);

        var plans = {
          start: { base: 999, messages: "300 РЎРғР С•Р С•Р ВұРЎвҖ°Р ВөР Р…Р С‘Р в„– Р РҶ Р СҳР ВөРЎРғРЎРҸРЎвҖ ", included: 1 },
          standard: { base: 1999, messages: "1000 РЎРғР С•Р С•Р ВұРЎвҖ°Р ВөР Р…Р С‘Р в„– Р РҶ Р СҳР ВөРЎРғРЎРҸРЎвҖ ", included: 1 },
          max: { base: 3999, messages: "Р Т‘Р С• 3000 РЎРғР С•Р С•Р ВұРЎвҖ°Р ВөР Р…Р С‘Р в„– Р РҶ Р СҳР ВөРЎРғРЎРҸРЎвҖ ", included: 3 }
        };

        function selectedPlan() {
          var input = widget.querySelector('input[name="liza-plan"]:checked');
          return input ? input.value : "start";
        }

        function selectedMessengers() {
          return Array.prototype.slice.call(widget.querySelectorAll('.liza-messenger-row input[type="checkbox"]:checked')).length;
        }

        function sync() {
          var planKey = selectedPlan();
          var cfg = plans[planKey];
          var boxes = Array.prototype.slice.call(widget.querySelectorAll('.liza-messenger-row input[type="checkbox"]'));

          widget.querySelectorAll(".liza-plan").forEach(function (card) {
            card.classList.toggle("active", card.getAttribute("data-plan") === planKey);
          });

          if (planKey === "max") {
            boxes.forEach(function (box) { box.checked = true; box.disabled = true; });
          } else {
            boxes.forEach(function (box) { box.disabled = false; });
            if (selectedMessengers() === 0 && boxes[0]) boxes[0].checked = true;
          }

          var selected = selectedMessengers();
          var extra = planKey === "max" ? 0 : Math.max(0, selected - cfg.included) * 750;
          var total = cfg.base + extra;

          widget.querySelector("[data-summary-price]").textContent = total + " РІвҖҡР… / Р СҳР ВөРЎРғ";
          widget.querySelector("[data-summary-msg]").textContent = "Р вҖәР С‘Р СҳР С‘РЎвҖҡ: " + cfg.messages;
          if (planKey === "max") {
            widget.querySelector("[data-summary-ms]").textContent = "Р вҖҷР С”Р В»РЎРӢРЎвҖЎР ВөР Р…РЎвҖ№ Р РҶРЎРғР Вө Р СҳР ВөРЎРғРЎРғР ВөР Р…Р Т‘Р В¶Р ВөРЎРӮРЎвҖ№ Р ВұР ВөР В· Р Т‘Р С•Р С—Р В»Р В°РЎвҖҡ";
          } else {
            widget.querySelector("[data-summary-ms]").textContent = "Р вҖҷР С”Р В»РЎРӢРЎвҖЎР ВөР Р…Р С•: 1 Р СҳР ВөРЎРғРЎРғР ВөР Р…Р Т‘Р В¶Р ВөРЎРӮ. Р вҖҷРЎвҖ№Р ВұРЎРӮР В°Р Р…Р С•: " + selected + ". Р вҖқР С•Р С—Р В»Р В°РЎвҖҡР В°: " + extra + " РІвҖҡР…";
          }
        }

        widget.addEventListener("change", sync);
        sync();
      }

      function applyGlobalCopy(root) {
        var replacements = [
          { from: "Р вҖәР С‘Р В·Р В° Р вҖҳР С•РЎвҖҡ Р С—Р С•Р СҳР С•Р С–Р В°Р ВөРЎвҖҡ", to: "Р вҖәР С‘Р В·Р В° Р вҖҳР С•РЎвҖҡ РЎС“Р РҶР ВөР В»Р С‘РЎвҖЎР С‘Р РҶР В°Р ВөРЎвҖҡ Р РҶРЎвҖ№РЎРӮРЎС“РЎвҖЎР С”РЎС“ РЎРғР В°Р В»Р С•Р Р…Р В°" },
          { from: "Р СҹР С•РЎвҖЎР ВөР СҳРЎС“ Р вҖәР С‘Р В·Р В°", to: "Р СҹР С•РЎвҖЎР ВөР СҳРЎС“ Р РҶРЎвҖ№Р ВұР С‘РЎРӮР В°РЎРӢРЎвҖҡ Р Р…Р В°РЎРғ" },
          { from: "Р СҹРЎРӮР ВөР С‘Р СҳРЎС“РЎвҖ°Р ВөРЎРғРЎвҖҡР РҶР В°", to: "Р В Р ВөР В·РЎС“Р В»РЎРҠРЎвҖҡР В°РЎвҖҡ, Р С”Р С•РЎвҖҡР С•РЎРӮРЎвҖ№Р в„– Р РҶР С‘Р Т‘Р Р…Р С• Р РҶ Р В·Р В°Р С—Р С‘РЎРғР С‘ Р С‘ Р РҶРЎвҖ№РЎРӮРЎС“РЎвҖЎР С”Р Вө" },
          { from: "Р СҹР С•Р С—РЎРӮР С•Р ВұРЎС“Р в„–РЎвҖҡР Вө Р ВұР ВөР В· РЎРӮР С‘РЎРғР С”Р В° Р С‘ Р В»Р С‘РЎвӮ¬Р Р…Р ВөР в„– РЎРғРЎС“Р ВөРЎвҖҡРЎвҖ№", to: "Р вҖ”Р В°Р С—РЎС“РЎРғР С” Р С—Р С•Р Т‘ Р С”Р В»РЎРӢРЎвҖЎ Р В·Р В° 1 Р Т‘Р ВөР Р…РЎРҠ: Р С—Р С•Р Т‘Р С”Р В»РЎРӢРЎвҖЎР В°Р ВөР Сҳ, Р Р…Р В°РЎРғРЎвҖҡРЎРӮР В°Р С‘Р РҶР В°Р ВөР Сҳ Р С‘ Р РҶР ВөР Т‘Р ВөР Сҳ Р С—Р ВөРЎРӮР РҶРЎвҖ№Р Вө РЎРӮР ВөР В·РЎС“Р В»РЎРҠРЎвҖҡР В°РЎвҖҡРЎвҖ№" }
        ];

        textElements(root).forEach(function (el) {
          var current = (el.textContent || "").trim();
          replacements.forEach(function (r) {
            if (current === r.from) el.textContent = r.to;
          });
        });
      }

      function enhance() {
        if (!document.body) return;
        applyGlobalCopy(document.body);
        rebuildResultSection(document.body);
        rebuildPricing(document.body);
      }

      window.addEventListener("load", function () {
        var attempts = 0;
        var maxAttempts = 12;
        var retry = setInterval(function () {
          enhance();
          attempts += 1;
          if (document.querySelector(".liza-pricing-widget") && attempts >= 2) {
            clearInterval(retry);
          } else if (attempts >= maxAttempts) {
            clearInterval(retry);
          }
        }, 250);
        enhance();
      }, { once: true });
    })();
  </script>
</body>
</html>
