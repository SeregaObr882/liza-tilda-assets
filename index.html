  <script>
    (function () {
      function normalize(value) {
        return (value || "").replace(/\s+/g, " ").trim().toLowerCase();
      }

      function textElements(root) {
        return Array.prototype.slice.call(root.querySelectorAll("h1,h2,h3,h4,p,span,button,div,label"));
      }

      function headingElements(root) {
        return Array.prototype.slice.call(root.querySelectorAll("h1,h2,h3,h4"));
      }

      function hasAny(text, variants) {
        var n = normalize(text);
        return variants.some(function (v) { return n.indexOf(normalize(v)) !== -1; });
      }

      function findHeading(root, variants) {
        return headingElements(root).find(function (el) { return hasAny(el.textContent, variants); }) || null;
      }

      function closestSectionLike(el) {
        if (!el) return null;
        return el.closest("section, article, [data-slot], .container, .max-w-\\[1440px\\], .max-w-\\[1400px\\], .max-w-\\[1420px\\]") || el.parentElement;
      }

      function hideSectionBody(section, heading) {
        var keep = new Set();
        var node = heading;
        while (node && node !== section) {
          keep.add(node);
          node = node.parentElement;
        }

        Array.prototype.slice.call(section.children).forEach(function (child) {
          if (!keep.has(child)) child.classList.add("liza-old-content");
        });
      }

            function styleHowItWorks(root) {
        var howHeading = findHeading(root, ["Как это работает", "РљР°Рє СЌС‚Рѕ СЂР°Р±РѕС‚Р°РµС‚"]);
        if (!howHeading) return;
        var section = closestSectionLike(howHeading);
        if (!section) return;
        section.classList.add("liza-how-it-works");

        var inMessages = ["Добрый день", "Напоминаем", "Придете", "Ждем вас", "Ваша запись подтверждена", "Спасибо за оценку"];
        var outMessages = ["Да, подтверждаю", "Да, давайте", "Нет, отменить", "Спасибо, буду"];

        var all = textElements(section);
        var marked = [];
        all.forEach(function (el) {
          var txt = normalize(el.textContent);
          if (!txt) return;

          if (outMessages.some(function (m) { return txt.indexOf(normalize(m)) !== -1; })) {
            el.classList.add("liza-tg-msg", "liza-tg-msg--out");
            marked.push(el);
          } else if (inMessages.some(function (m) { return txt.indexOf(normalize(m)) !== -1; })) {
            el.classList.add("liza-tg-msg", "liza-tg-msg--in");
            marked.push(el);
          }

          if (txt.indexOf(normalize("Сообщение")) !== -1) {
            el.classList.add("liza-tg-input");
          }

          if (txt === normalize("Да, подтверждаю") || txt === normalize("Нет, отменить")) {
            el.classList.add("liza-tg-quick");
          }
        });

        section.querySelectorAll(".liza-tg-phone").forEach(function (el) {
          el.classList.remove("liza-tg-phone");
        });

        var candidates = [];
        marked.forEach(function (msg) {
          var p = msg.parentElement;
          var depth = 0;
          while (p && p !== section && depth < 14) {
            var msgCount = p.querySelectorAll(".liza-tg-msg").length;
            if (msgCount >= 4) {
              var r = p.getBoundingClientRect();
              var ratio = r.width > 0 ? r.height / r.width : 0;
              if (r.width >= 260 && r.width <= 620 && r.height >= 420 && r.height <= 1200 && ratio > 1.25 && ratio < 3.2) {
                var score = Math.abs(r.width - 390) + Math.abs(r.height - 800) + depth * 8;
                if (normalize(p.textContent).indexOf(normalize("Сообщение")) !== -1) score -= 140;
                candidates.push({ el: p, score: score });
              }
            }
            p = p.parentElement;
            depth += 1;
          }
        });

        if (candidates.length > 0) {
          candidates.sort(function (a, b) { return a.score - b.score; });
          var phone = candidates[0].el;
          phone.classList.add("liza-tg-phone");

          var headerCandidates = textElements(phone).filter(function (el) {
            var t = normalize(el.textContent);
            return t === normalize("Лиза Бот") || t.indexOf(normalize("Лиза Бот")) !== -1;
          });
          if (headerCandidates.length > 0) {
            var headerWrap = headerCandidates[0].closest("div");
            if (headerWrap) headerWrap.classList.add("liza-tg-chat-header");
          }
        }
      }

      function rebuildResultSection(root) {
        var heading = findHeading(root, ["Р§С‚Рѕ СЂРµР°Р»СЊРЅРѕ РґР°СЃС‚ СЂРµР·СѓР»СЊС‚Р°С‚", "Р§С‚Рѕ СЂРµР°Р»СЊРЅРѕ РґР°РµС‚ СЂРµР·СѓР»СЊС‚Р°С‚", "Р§С‚Рѕ СЂРµР°Р»СЊРЅРѕ СЂР°Р±РѕС‚Р°РµС‚ РІ РјРѕРґСѓР»Рµ", "Р В§РЎвЂљР С• РЎР‚Р ВµР В°Р В»РЎРЉР Р…Р С•"]);
        if (!heading) return;
        var section = closestSectionLike(heading);
        if (!section || section.querySelector(".liza-results-rebuild")) return;

        heading.textContent = "Р§С‚Рѕ РїСЂРёРЅРѕСЃРёС‚ СЃР°Р»РѕРЅСѓ РґРµРЅСЊРіРё СѓР¶Рµ РІ РїРµСЂРІС‹Р№ РјРµСЃСЏС†";
        hideSectionBody(section, heading);

        var block = document.createElement("div");
        block.className = "liza-results-rebuild";
        block.innerHTML =
          '<div class="liza-results-lead">РњС‹ РЅРµ РїСЂРѕРґР°РµРј "Р±РѕС‚ СЂР°РґРё Р±РѕС‚Р°". РњС‹ Р·Р°РєСЂС‹РІР°РµРј РєРѕРЅРєСЂРµС‚РЅС‹Рµ С‚РѕС‡РєРё РїРѕС‚РµСЂСЊ РІ Р·Р°РїРёСЃРё: РЅРµСЏРІРєРё, РѕС‚РјРµРЅС‹, РјРѕР»С‡Р°РЅРёРµ РїРѕСЃР»Рµ РІРёР·РёС‚Р° Рё РЅРµРіР°С‚РёРІ Р±РµР· СЂРµР°РєС†РёРё Р°РґРјРёРЅРёСЃС‚СЂР°С‚РѕСЂР°.</div>' +
          '<div class="liza-results-grid">' +
            '<article class="liza-results-card"><h3 class="liza-results-title">РЎРЅРёР¶РµРЅРёРµ РЅРµСЏРІРѕРє</h3><p class="liza-results-copy">РљР»РёРµРЅС‚ РІРѕРІСЂРµРјСЏ РїРѕР»СѓС‡Р°РµС‚ РЅР°РїРѕРјРёРЅР°РЅРёРµ Рё РїРѕРґС‚РІРµСЂР¶РґР°РµС‚ РІРёР·РёС‚. РђРґРјРёРЅ Р·Р°СЂР°РЅРµРµ РІРёРґРёС‚, РєРѕРіРѕ РЅСѓР¶РЅРѕ РїРµСЂРµР·Р°РїРёСЃР°С‚СЊ.</p><div class="liza-results-metric">Р¤РѕРєСѓСЃ KPI: РґРѕС…РѕРґРёРјРѕСЃС‚СЊ РІ СЃРјРµРЅРµ</div></article>' +
            '<article class="liza-results-card"><h3 class="liza-results-title">Р’РѕР·РІСЂР°С‚ РїРѕС‚РµСЂСЏРЅРЅС‹С… РєР»РёРµРЅС‚РѕРІ</h3><p class="liza-results-copy">РџРѕСЃР»Рµ РѕС‚РјРµРЅС‹ РёР»Рё СЃС‚Р°С‚СѓСЃР° "РЅРµ РїСЂРёС€РµР»" РєР»РёРµРЅС‚ РІРѕР·РІСЂР°С‰Р°РµС‚СЃСЏ РІ РґРёР°Р»РѕРі СЃ РїСЂРµРґР»РѕР¶РµРЅРёРµРј СѓРґРѕР±РЅРѕРіРѕ РІСЂРµРјРµРЅРё.</p><div class="liza-results-metric">Р¤РѕРєСѓСЃ KPI: РїРѕРІС‚РѕСЂРЅС‹Рµ Р·Р°РїРёСЃРё</div></article>' +
            '<article class="liza-results-card"><h3 class="liza-results-title">Р РѕСЃС‚ СЂРµР№С‚РёРЅРіР° Рё РѕС‚Р·С‹РІРѕРІ</h3><p class="liza-results-copy">РџРѕР·РёС‚РёРІРЅС‹С… РєР»РёРµРЅС‚РѕРІ РѕС‚РїСЂР°РІР»СЏРµРј РІ РѕС‚Р·С‹РІС‹, Р° РЅРµРіР°С‚РёРІ СЃСЂР°Р·Сѓ СѓС…РѕРґРёС‚ Р°РґРјРёРЅСѓ РґР»СЏ Р±С‹СЃС‚СЂРѕРіРѕ СЂРµС€РµРЅРёСЏ.</p><div class="liza-results-metric">Р¤РѕРєСѓСЃ KPI: СЂРµР№С‚РёРЅРі Рё NPS</div></article>' +
            '<article class="liza-results-card"><h3 class="liza-results-title">Р­РєРѕРЅРѕРјРёСЏ РІСЂРµРјРµРЅРё РєРѕРјР°РЅРґС‹</h3><p class="liza-results-copy">Р СѓС‡РЅС‹Рµ РїРѕРґС‚РІРµСЂР¶РґРµРЅРёСЏ, РґРѕРіРѕРЅСЏСЋС‰РёРµ СЃРѕРѕР±С‰РµРЅРёСЏ Рё СЃРµСЂРІРёСЃРЅС‹Рµ Р°Р»РµСЂС‚С‹ СѓС…РѕРґСЏС‚ РІ Р°РІС‚РѕРјР°С‚РёР·Р°С†РёСЋ.</p><div class="liza-results-metric">Р¤РѕРєСѓСЃ KPI: РЅР°РіСЂСѓР·РєР° Р°РґРјРёРЅРёСЃС‚СЂР°С‚РѕСЂР°</div></article>' +
          '</div>';

        section.appendChild(block);
      }

      function rebuildPricing(root) {
        var heading = findHeading(root, ["РўР°СЂРёС„С‹ Рё РєР°Р»СЊРєСѓР»СЏС‚РѕСЂ", "РўР°СЂРёС„С‹", "Р СћР В°РЎР‚Р С‘РЎвЂћРЎвЂ№"]);
        if (!heading) return;
        var section = closestSectionLike(heading);
        if (!section || section.querySelector(".liza-pricing-widget")) return;

        hideSectionBody(section, heading);

        var widget = document.createElement("div");
        widget.className = "liza-pricing-widget";
        widget.innerHTML =
          '<div class="liza-pricing-grid">' +
            '<label class="liza-plan active" data-plan="start"><input type="radio" name="liza-plan" value="start" checked><p class="liza-plan-name">РЎС‚Р°СЂС‚</p><p class="liza-plan-price">999 в‚Ѕ</p><p class="liza-plan-meta">300 СЃРѕРѕР±С‰РµРЅРёР№<br>1 РјРµСЃСЃРµРЅРґР¶РµСЂ РІРєР»СЋС‡РµРЅ</p></label>' +
            '<label class="liza-plan" data-plan="standard"><input type="radio" name="liza-plan" value="standard"><p class="liza-plan-name">РЎС‚Р°РЅРґР°СЂС‚</p><p class="liza-plan-price">1999 в‚Ѕ</p><p class="liza-plan-meta">1000 СЃРѕРѕР±С‰РµРЅРёР№<br>1 РјРµСЃСЃРµРЅРґР¶РµСЂ РІРєР»СЋС‡РµРЅ</p></label>' +
            '<label class="liza-plan" data-plan="max"><input type="radio" name="liza-plan" value="max"><p class="liza-plan-name">РњР°РєСЃРёРјСѓРј</p><p class="liza-plan-price">3999 в‚Ѕ</p><p class="liza-plan-meta">РґРѕ 3000 СЃРѕРѕР±С‰РµРЅРёР№<br>РІСЃРµ РјРµСЃСЃРµРЅРґР¶РµСЂС‹ РІРєР»СЋС‡РµРЅС‹</p></label>' +
          '</div>' +
          '<p class="liza-pricing-row-title">Р’С‹Р±РµСЂРёС‚Рµ РјРµСЃСЃРµРЅРґР¶РµСЂС‹:</p>' +
          '<div class="liza-messenger-row">' +
            '<label class="liza-ms-item"><input type="checkbox" value="telegram" checked>Telegram</label>' +
            '<label class="liza-ms-item"><input type="checkbox" value="whatsapp">WhatsApp</label>' +
            '<label class="liza-ms-item"><input type="checkbox" value="vk">Р’РљРѕРЅС‚Р°РєС‚Рµ</label>' +
          '</div>' +
          '<div class="liza-pricing-summary">' +
            '<div class="liza-summary-big" data-summary-price>999 в‚Ѕ / РјРµСЃ</div>' +
            '<div class="liza-summary-line" data-summary-msg>Р›РёРјРёС‚: 300 СЃРѕРѕР±С‰РµРЅРёР№ РІ РјРµСЃСЏС†</div>' +
            '<div class="liza-summary-line" data-summary-ms>Р’РєР»СЋС‡РµРЅРѕ: 1 РјРµСЃСЃРµРЅРґР¶РµСЂ. РљР°Р¶РґС‹Р№ РґРѕРїРѕР»РЅРёС‚РµР»СЊРЅС‹Р№: +750 в‚Ѕ</div>' +
          '</div>';

        section.appendChild(widget);

        var plans = {
          start: { base: 999, messages: "300 СЃРѕРѕР±С‰РµРЅРёР№ РІ РјРµСЃСЏС†", included: 1 },
          standard: { base: 1999, messages: "1000 СЃРѕРѕР±С‰РµРЅРёР№ РІ РјРµСЃСЏС†", included: 1 },
          max: { base: 3999, messages: "РґРѕ 3000 СЃРѕРѕР±С‰РµРЅРёР№ РІ РјРµСЃСЏС†", included: 3 }
        };

        function selectedPlan() {
          var input = widget.querySelector('input[name="liza-plan"]:checked');
          return input ? input.value : "start";
        }

        function selectedMessengers() {
          return Array.prototype.slice.call(widget.querySelectorAll('.liza-messenger-row input[type="checkbox"]:checked')).length;
        }

        function sync() {
          var planKey = selectedPlan();
          var cfg = plans[planKey];
          var boxes = Array.prototype.slice.call(widget.querySelectorAll('.liza-messenger-row input[type="checkbox"]'));

          widget.querySelectorAll(".liza-plan").forEach(function (card) {
            card.classList.toggle("active", card.getAttribute("data-plan") === planKey);
          });

          if (planKey === "max") {
            boxes.forEach(function (box) { box.checked = true; box.disabled = true; });
          } else {
            boxes.forEach(function (box) { box.disabled = false; });
            if (selectedMessengers() === 0 && boxes[0]) boxes[0].checked = true;
          }

          var selected = selectedMessengers();
          var extra = planKey === "max" ? 0 : Math.max(0, selected - cfg.included) * 750;
          var total = cfg.base + extra;

          widget.querySelector("[data-summary-price]").textContent = total + " в‚Ѕ / РјРµСЃ";
          widget.querySelector("[data-summary-msg]").textContent = "Р›РёРјРёС‚: " + cfg.messages;
          if (planKey === "max") {
            widget.querySelector("[data-summary-ms]").textContent = "Р’РєР»СЋС‡РµРЅС‹ РІСЃРµ РјРµСЃСЃРµРЅРґР¶РµСЂС‹ Р±РµР· РґРѕРїР»Р°С‚";
          } else {
            widget.querySelector("[data-summary-ms]").textContent = "Р’РєР»СЋС‡РµРЅРѕ: 1 РјРµСЃСЃРµРЅРґР¶РµСЂ. Р’С‹Р±СЂР°РЅРѕ: " + selected + ". Р”РѕРїР»Р°С‚Р°: " + extra + " в‚Ѕ";
          }
        }

        widget.addEventListener("change", sync);
        sync();
      }

      function applyGlobalCopy(root) {
        var replacements = [
          { from: "Р›РёР·Р° Р‘РѕС‚ РїРѕРјРѕРіР°РµС‚", to: "Р›РёР·Р° Р‘РѕС‚ СѓРІРµР»РёС‡РёРІР°РµС‚ РІС‹СЂСѓС‡РєСѓ СЃР°Р»РѕРЅР°" },
          { from: "РџРѕС‡РµРјСѓ Р›РёР·Р°", to: "РџРѕС‡РµРјСѓ РІС‹Р±РёСЂР°СЋС‚ РЅР°СЃ" },
          { from: "РџСЂРµРёРјСѓС‰РµСЃС‚РІР°", to: "Р РµР·СѓР»СЊС‚Р°С‚, РєРѕС‚РѕСЂС‹Р№ РІРёРґРЅРѕ РІ Р·Р°РїРёСЃРё Рё РІС‹СЂСѓС‡РєРµ" },
          { from: "РџРѕРїСЂРѕР±СѓР№С‚Рµ Р±РµР· СЂРёСЃРєР° Рё Р»РёС€РЅРµР№ СЃСѓРµС‚С‹", to: "Р—Р°РїСѓСЃРє РїРѕРґ РєР»СЋС‡ Р·Р° 1 РґРµРЅСЊ: РїРѕРґРєР»СЋС‡Р°РµРј, РЅР°СЃС‚СЂР°РёРІР°РµРј Рё РІРµРґРµРј РїРµСЂРІС‹Рµ СЂРµР·СѓР»СЊС‚Р°С‚С‹" }
        ];

        textElements(root).forEach(function (el) {
          if (el.closest(".liza-how-it-works")) return;
          var current = (el.textContent || "").trim();
          replacements.forEach(function (r) {
            if (current === r.from) el.textContent = r.to;
          });
        });
      }

      function enhance() {
        if (!document.body) return;
        styleHowItWorks(document.body);
        applyGlobalCopy(document.body);
        rebuildResultSection(document.body);
        rebuildPricing(document.body);
      }

      var timer = null;
      var observer = new MutationObserver(function () {
        if (timer) clearTimeout(timer);
        timer = setTimeout(enhance, 120);
      });

      window.addEventListener("load", function () {
        enhance();
        observer.observe(document.body, { childList: true, subtree: true });
      }, { once: true });
    })();
  </script>
